<style>
:root{
  --g900:#005a32;--g800:#006B3C;--g700:#00894b;--g600:#00A651;--g400:#3cba6f;--g300:#8dd3a6;
  --g100:#E8F5EE;--g50:#f3faf5;
  --accent:#7AC143;
  --bg:#eef2f0;--surface:#ffffff;--surface2:#f5f9f6;--surface3:#eef4f0;
  --border:#dbe6df;--text:#15302a;--muted:#5f746b;--muted2:#86978d;
  --danger:#dc2626;--danger-bg:#fdecec;--warn:#d97706;--warn-bg:#fef3e2;--info:#2563eb;--info-bg:#eaf1fe;--ok:#0f9d58;
  --shadow:0 1px 2px rgba(0,60,33,.04),0 4px 14px rgba(0,60,33,.06);
  --shadow-lg:0 18px 48px rgba(0,60,33,.16);
  --r:12px;--rl:18px;--rs:9px;--sidebar:268px;--header:64px;
  --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,system-ui,sans-serif;
}
[data-theme="dark"]{
  --bg:#0d1411;--surface:#141d18;--surface2:#19241e;--surface3:#1f2c24;
  --border:#26392f;--text:#e7f3ec;--muted:#9fb6a9;--muted2:#6f8377;
  --danger:#f87171;--danger-bg:#3a1d1d;--warn:#fbbf24;--warn-bg:#3a2c12;--info:#93b4fb;--info-bg:#1c2740;
  --shadow:0 1px 2px rgba(0,0,0,.3),0 6px 20px rgba(0,0,0,.35);
  --shadow-lg:0 24px 60px rgba(0,0,0,.55);
  --g100:#16271d;--g50:#13201a;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
button,input,select,textarea{font:inherit;color:inherit}
a{text-decoration:none;color:inherit}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:20px;border:2px solid var(--bg)}
::-webkit-scrollbar-thumb:hover{background:var(--muted2)}

/* ---------- LAYOUT ---------- */
.app{display:grid;grid-template-columns:var(--sidebar) 1fr;min-height:100vh;transition:grid-template-columns .22s ease}
.app.nav-collapsed{grid-template-columns:78px 1fr}
.scrim{display:none}

/* ---------- SIDEBAR ---------- */
.sidebar{position:sticky;top:0;height:100vh;background:linear-gradient(180deg,var(--g900),#04492c 60%,#033c24);color:#fff;display:flex;flex-direction:column;gap:6px;padding:16px 12px;overflow:hidden}
.brand{display:flex;gap:11px;align-items:center;padding:8px 8px 6px;min-height:54px}
.brand-logo{width:46px;height:46px;background:#fff;border-radius:11px;padding:5px;display:grid;place-items:center;flex:0 0 auto;box-shadow:0 4px 12px rgba(0,0,0,.18)}
.brand-logo img{width:100%;height:100%;object-fit:contain}
.brand-txt h1{font-size:.98rem;font-weight:800;letter-spacing:.2px;white-space:nowrap}
.brand-txt p{font-size:.7rem;color:rgba(255,255,255,.6);white-space:nowrap;font-weight:600}
.nav-search{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.14);border-radius:10px;padding:8px 11px;margin:4px 4px 8px}
.nav-search input{background:transparent;border:0;outline:0;color:#fff;width:100%;font-size:.86rem}
.nav-search input::placeholder{color:rgba(255,255,255,.55)}
.nav-search svg{flex:0 0 auto;opacity:.8}
.nav{flex:1;overflow-y:auto;overflow-x:hidden;display:flex;flex-direction:column;gap:2px;padding:0 2px;scrollbar-width:thin}
.nav::-webkit-scrollbar{width:6px}.nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,.18)}
.nav-group{font-size:.66rem;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.46);padding:14px 12px 5px;font-weight:700;white-space:nowrap}
.nav-link{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;font-weight:600;font-size:.9rem;color:rgba(255,255,255,.85);position:relative;cursor:pointer;transition:background .14s,color .14s}
.nav-link svg{flex:0 0 auto;width:19px;height:19px;opacity:.92}
.nav-link .lbl{white-space:nowrap}
.nav-link .badge{margin-left:auto;background:rgba(255,255,255,.18);font-size:.68rem;font-weight:700;padding:1px 7px;border-radius:20px}
.nav-link:hover{background:rgba(255,255,255,.1);color:#fff}
.nav-link.active{background:rgba(255,255,255,.16);color:#fff;box-shadow:inset 0 0 0 1px rgba(255,255,255,.08)}
.nav-link.active::before{content:"";position:absolute;left:-12px;top:50%;transform:translateY(-50%);width:4px;height:22px;background:var(--accent);border-radius:0 4px 4px 0}
.nav-foot{padding:10px 8px 4px;border-top:1px solid rgba(255,255,255,.1);margin-top:6px}
.profile{display:flex;align-items:center;gap:10px;padding:8px;border-radius:11px;background:rgba(255,255,255,.07)}
.avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--g400),var(--accent));display:grid;place-items:center;font-weight:800;color:#06351f;flex:0 0 auto;font-size:.85rem}
.profile-txt{overflow:hidden}
.profile-txt strong{display:block;font-size:.84rem;white-space:nowrap}
.profile-txt span{font-size:.72rem;color:rgba(255,255,255,.6);white-space:nowrap}
.app.nav-collapsed .brand-txt,.app.nav-collapsed .nav-search input,.app.nav-collapsed .nav-group,
.app.nav-collapsed .nav-link .lbl,.app.nav-collapsed .nav-link .badge,.app.nav-collapsed .profile-txt{display:none}
.app.nav-collapsed .nav-search{justify-content:center;padding:9px}
.app.nav-collapsed .nav-link{justify-content:center;padding:11px 0}
.app.nav-collapsed .nav-link.active::before{left:-12px}
.app.nav-collapsed .profile{justify-content:center}
.app.nav-collapsed .brand{justify-content:center}
.made-by{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:9px;font-size:.72rem;color:rgba(255,255,255,.55);font-weight:600;text-decoration:none;transition:color .14s}
.made-by:hover{color:#fff}
.made-by svg{opacity:.85;flex:0 0 auto}
.app.nav-collapsed .made-by span{display:none}
.submit-work{width:100%;justify-content:center;margin-top:9px;background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.18);color:#fff}
.submit-work:hover{background:rgba(255,255,255,.18)}
.app.nav-collapsed .submit-work span{display:none}

/* ---------- NOTIFICAÇÕES ---------- */
.notif-wrap{position:relative;display:flex}
.notif-badge{position:absolute;top:-3px;right:-3px;background:var(--danger);color:#fff;font-size:.62rem;font-weight:800;min-width:16px;height:16px;border-radius:20px;display:grid;place-items:center;padding:0 4px;pointer-events:none;border:2px solid var(--surface)}
.notif-panel{position:absolute;top:48px;right:0;width:340px;max-width:86vw;background:var(--surface);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow-lg);opacity:0;transform:translateY(-6px);pointer-events:none;transition:.16s;z-index:90;overflow:hidden}
.notif-panel.open{opacity:1;transform:none;pointer-events:auto}
.notif-head{padding:12px 16px;border-bottom:1px solid var(--border);font-weight:800;font-size:.9rem;display:flex;justify-content:space-between;align-items:center}
.notif-list{max-height:60vh;overflow-y:auto}
.notif-item{display:flex;gap:11px;padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s}
.notif-item:last-child{border-bottom:0}
.notif-item:hover{background:var(--surface2)}
.notif-item .ni-ic{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;flex:0 0 auto}
.notif-item .grow{min-width:0}
.notif-item strong{display:block;font-size:.85rem}
.notif-item span{font-size:.78rem;color:var(--muted)}
.notif-empty{padding:28px 16px;text-align:center;color:var(--muted);font-size:.86rem}

/* ---------- MAIN / HEADER ---------- */
.main{min-width:0;display:flex;flex-direction:column}
.header{height:var(--header);position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;gap:16px;padding:0 22px;background:color-mix(in srgb,var(--surface) 86%,transparent);backdrop-filter:blur(14px);border-bottom:1px solid var(--border)}
.header-l{display:flex;align-items:center;gap:14px;min-width:0}
.header-l h2{font-size:1.12rem;font-weight:800;white-space:nowrap}
.breadcrumb{font-size:.78rem;color:var(--muted);font-weight:600}
.header-r{display:flex;align-items:center;gap:9px}
.content{padding:24px;display:flex;flex-direction:column;gap:22px;max-width:1480px;width:100%;margin:0 auto}
.view{display:none;flex-direction:column;gap:22px;animation:fade .26s ease}
.view.active{display:flex}
@keyframes fade{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}

/* ---------- BUTTONS ---------- */
.btn,.btn-sec,.btn-ghost,.btn-danger,.icon-btn,.btn-out{border:1px solid transparent;border-radius:10px;cursor:pointer;font-weight:700;display:inline-flex;align-items:center;justify-content:center;gap:7px;transition:transform .08s,background .15s,box-shadow .15s;white-space:nowrap}
.btn:active,.btn-sec:active,.icon-btn:active,.btn-danger:active,.btn-ghost:active,.btn-out:active{transform:translateY(1px)}
.btn{padding:9px 15px;background:var(--g600);color:#fff;box-shadow:0 2px 8px rgba(0,166,81,.28)}
.btn:hover{background:var(--g700)}
.btn-sec{padding:9px 14px;background:var(--surface);border-color:var(--border);color:var(--text)}
.btn-sec:hover{background:var(--surface2);border-color:var(--g300)}
.btn-ghost{padding:8px 12px;background:transparent;border-color:transparent;color:var(--muted);font-weight:600}
.btn-ghost:hover{background:var(--surface2);color:var(--text)}
.btn-danger{padding:9px 14px;background:var(--danger-bg);border-color:transparent;color:var(--danger)}
.btn-danger:hover{filter:brightness(.97)}
.icon-btn{width:40px;height:40px;justify-content:center;background:var(--surface);border-color:var(--border);color:var(--muted)}
.lang-btn{font-weight:800;font-size:.78rem;letter-spacing:.04em;color:var(--g700)}
.pager{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:16px;flex-wrap:wrap}
.pager-info{font-size:.8rem;color:var(--muted);font-weight:600}
.pager-btns{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.pg-num{min-width:32px;height:32px;padding:0 9px;border:1px solid var(--border);background:var(--surface);border-radius:8px;font-size:.82rem;font-weight:700;color:var(--text);cursor:pointer;display:inline-grid;place-items:center}
.pg-num:hover{border-color:var(--g500);color:var(--g700)}
.pg-num.active{background:var(--g600);color:#fff;border-color:var(--g600);cursor:default}
.pg-dots{color:var(--muted);padding:0 2px}
.pager-btns .btn-xs[disabled]{opacity:.4;cursor:not-allowed;pointer-events:none}
.mail-split{display:grid;grid-template-columns:1.18fr 1fr;gap:18px;align-items:start;margin-bottom:18px}
@media(max-width:1000px){.mail-split{grid-template-columns:1fr}}
.read-steps{display:flex;gap:6px;flex-wrap:wrap}
.read-steps .rs{display:inline-flex;align-items:center;gap:4px;font-size:.71rem;font-weight:700;padding:3px 9px;border-radius:20px;background:var(--surface3);color:var(--muted)}
.read-steps .rs.done{background:var(--g100);color:var(--g700)}
.mail-search-wrap{position:relative}
.mail-results{position:absolute;top:100%;left:0;right:0;z-index:30;background:var(--surface);border:1px solid var(--border);border-radius:10px;box-shadow:var(--shadow-lg);max-height:264px;overflow-y:auto;margin-top:4px;display:none}
.mail-result{display:flex;align-items:center;gap:10px;padding:8px 11px;cursor:pointer;border-bottom:1px solid var(--border)}
.mail-result:last-child{border-bottom:0}
.mail-result:hover{background:var(--surface2)}
.mail-result.is-empty{cursor:default;justify-content:center;color:var(--muted);font-size:.84rem}
.picked{display:flex;align-items:center;gap:11px;padding:9px 12px;border:1px solid var(--g300);background:var(--g50);border-radius:10px}
.scroll-list{max-height:360px;overflow-y:auto;padding-right:4px}
.sig-toolbar{display:flex;flex-wrap:wrap;gap:5px;align-items:center;padding:7px 8px;border:1px solid var(--border);border-bottom:0;border-radius:10px 10px 0 0;background:var(--surface2)}
.sig-toolbar select{height:30px;padding:0 6px;font-size:.78rem;border:1px solid var(--border);border-radius:7px;background:var(--surface);color:var(--text)}
.sig-tb{height:30px;min-width:30px;padding:0 7px;display:inline-grid;place-items:center;border:1px solid var(--border);border-radius:7px;background:var(--surface);color:var(--text);cursor:pointer;font-size:.92rem;font-weight:700}
.sig-tb:hover{border-color:var(--g500);background:var(--g50)}
.sig-editor{min-height:120px;max-height:240px;overflow-y:auto;border:1px solid var(--border);border-radius:0 0 10px 10px;padding:12px 14px;background:var(--surface);color:var(--text);outline:none}
.sig-editor:focus{border-color:var(--g500)}
.sig-editor img{vertical-align:middle}
.sig-editor:empty:before{content:'Escreva aqui a sua assinatura…';color:var(--muted2)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:14px}
.cal-dow{text-align:center;font-size:.7rem;font-weight:800;color:var(--muted);padding:4px 0;text-transform:uppercase;letter-spacing:.03em}
.cal-cell{min-height:90px;border:1px solid var(--border);border-radius:9px;padding:5px 6px;display:flex;flex-direction:column;gap:3px;cursor:pointer;transition:.12s;background:var(--surface);overflow:hidden}
.cal-cell:hover{border-color:var(--g400);background:var(--surface2)}
.cal-cell.empty{border:0;background:transparent;cursor:default}
.cal-cell.today{border-color:var(--g500);box-shadow:inset 0 0 0 1.5px var(--g500)}
.cal-num{font-size:.78rem;font-weight:700;color:var(--text)}
.cal-cell.today .cal-num{color:var(--g700)}
.cal-task{font-size:.67rem;font-weight:700;padding:2px 6px;border-radius:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;line-height:1.4}
.cal-task.blue{background:var(--info-bg);color:var(--info)}
.cal-task.green{background:var(--g100);color:var(--g700)}
.cal-task.amber{background:var(--warn-bg);color:var(--warn)}
.cal-task.purple{background:#efe7fb;color:#7c3aed}
.cal-task.grey{background:var(--surface3);color:var(--muted)}
.cal-more{font-size:.64rem;color:var(--muted);font-weight:700}
.task-check{width:20px;height:20px;flex:0 0 auto;border:2px solid var(--border);border-radius:6px;background:var(--surface);cursor:pointer;display:grid;place-items:center;color:#fff;padding:0;margin-right:9px}
.task-check.on{background:var(--g600);border-color:var(--g600)}
@media(max-width:760px){.cal-cell{min-height:56px}.cal-task{display:none}}
.seg-toggle{display:inline-flex;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.seg-toggle button{padding:6px 12px;font-size:.79rem;font-weight:700;background:var(--surface);color:var(--muted);border:0;cursor:pointer;transition:.12s}
.seg-toggle button.active{background:var(--g600);color:#fff}
.week-wrap{margin-top:12px;border:1px solid var(--border);border-radius:10px;overflow:hidden}
.week-row{display:grid;grid-template-columns:54px repeat(7,1fr)}
.week-head>div{padding:6px 2px;text-align:center;font-size:.66rem;font-weight:700;color:var(--muted);background:var(--surface2);border-bottom:1px solid var(--border)}
.wk-dayhead strong{font-size:.98rem;color:var(--text)}
.wk-dayhead.today{color:var(--g700);background:var(--g100)}.wk-dayhead.today strong{color:var(--g700)}
.week-allday{border-bottom:2px solid var(--border)}
.week-allday>.wk-axis-lbl{font-size:.6rem;font-weight:700;color:var(--muted);text-align:center;padding:4px 2px;border-right:1px solid var(--border);display:flex;align-items:center;justify-content:center;line-height:1.1;text-transform:uppercase;letter-spacing:.02em}
.wk-allcol{border-left:1px solid var(--border);padding:4px;display:flex;flex-direction:column;gap:3px;cursor:pointer;min-height:34px;justify-content:center}
.week-body{display:grid;grid-template-columns:54px repeat(7,1fr);position:relative}
.wk-axis{display:flex;flex-direction:column}
.wk-hour{font-size:.64rem;color:var(--muted);text-align:right;padding:2px 6px 0;border-right:1px solid var(--border);box-sizing:border-box}
.wk-col{position:relative;border-left:1px solid var(--border);cursor:pointer;background:repeating-linear-gradient(to bottom,var(--border),var(--border) 1px,transparent 1px,transparent 48px)}
.wk-col.today{background:repeating-linear-gradient(to bottom,var(--g300),var(--g300) 1px,var(--g50) 1px,var(--g50) 48px)}
.wk-task{position:absolute;left:2px;right:2px;border-radius:5px;padding:2px 5px;font-size:.64rem;font-weight:600;overflow:hidden;cursor:pointer;color:#fff;line-height:1.22;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.wk-task.blue{background:var(--info)}.wk-task.green{background:var(--g600)}.wk-task.amber{background:#d9912f}.wk-task.purple{background:#7c3aed}.wk-task.grey{background:var(--muted)}
.wk-task.done{opacity:.5;text-decoration:line-through}
.icon-btn:hover{background:var(--surface2);color:var(--text)}
.btn svg,.btn-sec svg,.btn-ghost svg,.btn-danger svg,.btn-out svg{width:17px;height:17px}
.btn-sm{padding:6px 11px;font-size:.82rem;border-radius:8px}
.btn-xs{padding:4px 9px;font-size:.76rem;border-radius:7px;font-weight:600}

/* ---------- CARDS ---------- */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);box-shadow:var(--shadow)}
.card-pad{padding:20px}
.section-head{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;flex-wrap:wrap}
.section-head h3{font-size:1.04rem;font-weight:800}
.section-head .sub{color:var(--muted);font-size:.84rem;margin-top:2px;font-weight:500}
.toolbar{display:flex;gap:9px;flex-wrap:wrap;align-items:center}
.muted{color:var(--muted)}
.grid{display:grid;gap:16px}
.cols-2{grid-template-columns:repeat(2,minmax(0,1fr))}
.cols-3{grid-template-columns:repeat(3,minmax(0,1fr))}
.cols-4{grid-template-columns:repeat(4,minmax(0,1fr))}
.split{display:grid;grid-template-columns:1.55fr 1fr;gap:16px;align-items:start}
.split.eq{align-items:stretch}
.split.eq>.card{display:flex;flex-direction:column}
.dash-cols{display:grid;grid-template-columns:1.55fr 1fr;gap:16px;align-items:start}
.dash-col{display:flex;flex-direction:column;gap:16px;min-width:0}
@media(max-width:900px){.dash-cols{grid-template-columns:1fr}}
.barchart{width:100%}
.barchart-plot{display:flex;align-items:flex-end;gap:8px;padding:0 2px}
.barchart-col{flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;height:100%;min-width:0;cursor:default}
.barchart-val{font-size:.64rem;font-weight:700;color:var(--muted);margin-bottom:4px;white-space:nowrap}
.barchart-fill{width:100%;max-width:48px;border-radius:5px 5px 0 0;background:linear-gradient(var(--g600),var(--g400));transition:height .35s}
.barchart-labels{display:flex;gap:8px;padding:8px 2px 0;border-top:1px solid var(--border);margin-top:2px}
.barchart-labels>div{flex:1;text-align:center;font-size:.72rem;font-weight:600;color:var(--muted)}

/* ---------- HERO ---------- */
.hero{display:grid;grid-template-columns:1.5fr 1fr;gap:20px;padding:26px;border-radius:var(--rl);background:linear-gradient(125deg,var(--g800),var(--g600) 55%,var(--g400));color:#fff;position:relative;overflow:hidden;box-shadow:0 16px 40px rgba(0,107,60,.24)}
.hero::after{content:"";position:absolute;right:-60px;top:-60px;width:280px;height:280px;background:radial-gradient(circle,rgba(255,255,255,.16),transparent 70%);pointer-events:none}
.hero h3{font-size:1.5rem;font-weight:800;margin-bottom:6px;position:relative}
.hero p{color:rgba(255,255,255,.88);max-width:46ch;position:relative}
.hero-actions{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap;position:relative}
.hero .btn{background:#fff;color:var(--g800)}
.hero .btn:hover{background:#f0f0f0}
.hero .btn-out{padding:9px 15px;background:rgba(255,255,255,.16);color:#fff;border:1px solid rgba(255,255,255,.45);font-weight:700}
.hero .btn-out:hover{background:rgba(255,255,255,.28)}
.hero-side{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:14px;padding:16px;position:relative;display:flex;flex-direction:column;gap:10px}
.hero-side .ring-wrap{display:flex;align-items:center;gap:14px}

/* ---------- KPI ---------- */
.kpi{padding:17px 18px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;gap:7px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.kpi .kpi-ic{position:absolute;right:14px;top:14px;width:34px;height:34px;border-radius:9px;display:grid;place-items:center;background:var(--g100);color:var(--g700)}
.kpi small{color:var(--muted);font-weight:600;font-size:.78rem;text-transform:uppercase;letter-spacing:.04em}
.kpi strong{font-size:1.72rem;font-weight:800;line-height:1;color:var(--text)}
.kpi .delta{font-size:.76rem;font-weight:700;display:inline-flex;align-items:center;gap:3px}
.delta.up{color:var(--ok)}.delta.down{color:var(--danger)}.delta.flat{color:var(--muted)}

/* ---------- TABLES ---------- */
.table-wrap{overflow:auto;border:1px solid var(--border);border-radius:var(--r);background:var(--surface)}
table{width:100%;border-collapse:collapse;font-size:.88rem}
th,td{padding:11px 14px;text-align:left;border-bottom:1px solid var(--border);vertical-align:middle;white-space:nowrap}
th{background:var(--surface2);font-size:.74rem;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);font-weight:700;position:sticky;top:0;z-index:1}
tbody tr{transition:background .12s}
tbody tr:hover{background:var(--surface2)}
tbody tr:last-child td{border-bottom:0}
td .cell-main{font-weight:700}
td .cell-sub{font-size:.78rem;color:var(--muted)}
.row-actions{display:flex;gap:6px;justify-content:flex-end}
.t-right{text-align:right}.t-center{text-align:center}

/* ---------- BADGES / PILLS ---------- */
.pill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:.74rem;font-weight:700;line-height:1.4;border:1px solid transparent}
.pill::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.9}
.pill.green{background:var(--g100);color:var(--g700)}
.pill.blue{background:var(--info-bg);color:var(--info)}
.pill.amber{background:var(--warn-bg);color:var(--warn)}
.pill.red{background:var(--danger-bg);color:var(--danger)}
.pill.grey{background:var(--surface3);color:var(--muted)}
.pill.purple{background:#f0e9fb;color:#7c3aed}
[data-theme="dark"] .pill.purple{background:#241a3a;color:#b794f6}
.chip{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:8px;font-size:.78rem;font-weight:600;background:var(--surface2);border:1px solid var(--border);color:var(--muted)}
.tag{display:inline-block;padding:2px 8px;border-radius:6px;font-size:.72rem;font-weight:700;background:var(--g100);color:var(--g700)}

/* ---------- FORMS ---------- */
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:.8rem;font-weight:700;color:var(--text)}
.field .hint{font-size:.74rem;color:var(--muted);font-weight:500}
.field input,.field select,.field textarea{width:100%;padding:9px 12px;border-radius:9px;border:1px solid var(--border);background:var(--surface2);transition:border .14s,box-shadow .14s;font-size:.9rem}
.field input:focus,.field select:focus,.field textarea:focus{outline:0;border-color:var(--g400);box-shadow:0 0 0 3px rgba(0,166,81,.14);background:var(--surface)}
.field textarea{resize:vertical;min-height:80px}
.form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
.form-grid .full{grid-column:1/-1}
.search-inp{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:0 11px}
.search-inp input{border:0;background:transparent;padding:9px 0}
.search-inp input:focus{box-shadow:none;border:0}
.search-inp svg{color:var(--muted);flex:0 0 auto}

/* ---------- EMPTY ---------- */
.empty{padding:34px 18px;text-align:center;color:var(--muted);background:var(--surface2);border:1px dashed var(--border);border-radius:var(--r);display:flex;flex-direction:column;align-items:center;gap:10px}
.empty svg{opacity:.45}
.empty strong{color:var(--text)}

/* ---------- LISTS ---------- */
.mini-list{display:flex;flex-direction:column}
.mini-item{display:flex;align-items:center;gap:12px;padding:11px 2px;border-bottom:1px solid var(--border)}
.mini-item:last-child{border-bottom:0}
.mini-item .ic{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;background:var(--g100);color:var(--g700);flex:0 0 auto}
.mini-item .grow{flex:1;min-width:0}
.mini-item .grow strong{display:block;font-size:.88rem}
.mini-item .grow span{font-size:.78rem;color:var(--muted)}

/* ---------- KANBAN ---------- */
.kanban{display:grid;grid-template-columns:repeat(5,minmax(210px,1fr));gap:13px;overflow-x:auto;padding-bottom:6px}
.kcol{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:11px;display:flex;flex-direction:column;gap:9px;min-width:210px;height:calc(100vh - 300px);min-height:360px;max-height:680px}
.kcol-head{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;font-weight:800;font-size:.84rem;padding:2px 4px}
.kcol-head .cnt{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:0 8px;font-size:.72rem;color:var(--muted)}
.kcol-head .dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}
.klist{flex:1 1 auto;display:flex;flex-direction:column;gap:9px;min-height:40px;border-radius:10px;transition:background .15s;padding:2px;overflow-y:auto;overflow-x:hidden}
.klist::-webkit-scrollbar{width:6px}.klist::-webkit-scrollbar-thumb{background:var(--border);border-radius:20px}
.klist.drop{background:var(--g100);outline:2px dashed var(--g400)}
.kcard{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:11px;display:flex;flex-direction:column;gap:7px;cursor:grab;box-shadow:var(--shadow)}
.kcard:active{cursor:grabbing}
.kcard.dragging{opacity:.5}
.kcard .knum{font-size:.72rem;color:var(--muted);font-weight:700}
.kcard .ktitle{font-weight:700;font-size:.88rem}
.kcard .kfoot{display:flex;align-items:center;justify-content:space-between;font-size:.8rem}
.kcard .kval{font-weight:800;color:var(--g700)}
.ktotal{flex:0 0 auto;font-weight:800;color:var(--g700);font-size:.82rem;text-align:right;padding:7px 4px 0;border-top:1px solid var(--border);margin-top:2px}

/* ---------- DRAWER ---------- */
.drawer-back{position:fixed;inset:0;background:rgba(8,20,15,.42);backdrop-filter:blur(2px);opacity:0;pointer-events:none;transition:opacity .25s;z-index:60}
.drawer-back.open{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:0;height:100vh;width:min(540px,94vw);background:var(--surface);box-shadow:var(--shadow-lg);transform:translateX(100%);transition:transform .28s cubic-bezier(.22,.61,.36,1);z-index:61;display:flex;flex-direction:column}
.drawer.open{transform:none}
.drawer-head{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px}
.drawer-body{padding:20px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:18px}
.drawer-foot{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px}

/* ---------- MODAL ---------- */
.modal-back{position:fixed;inset:0;background:rgba(8,20,15,.5);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;padding:20px;z-index:70}
.modal-back.open{display:flex;animation:fade .18s}
.modal{width:min(680px,100%);max-height:92vh;overflow:auto;background:var(--surface);border-radius:var(--rl);box-shadow:var(--shadow-lg);animation:pop .22s cubic-bezier(.22,.61,.36,1)}
.modal.wide{width:min(920px,100%)}
@keyframes pop{from{opacity:0;transform:scale(.96) translateY(8px)}to{opacity:1;transform:none}}
.modal-head{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;position:sticky;top:0;background:var(--surface);z-index:2}
.modal-head h3{font-size:1.06rem;font-weight:800}
.modal-head .sub{font-size:.8rem;color:var(--muted);font-weight:500}
.modal-body{padding:22px}
.modal-foot{padding:16px 22px;border-top:1px solid var(--border);display:flex;justify-content:space-between;gap:10px;align-items:center;position:sticky;bottom:0;background:var(--surface)}

/* ---------- LINE EDITOR ---------- */
.lines{display:flex;flex-direction:column;gap:8px}
.line-row{display:grid;grid-template-columns:2.4fr .7fr 1fr .7fr auto;gap:8px;align-items:end}
.line-head{display:grid;grid-template-columns:2.4fr .7fr 1fr .7fr auto;gap:8px;font-size:.72rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.03em;padding:0 2px}
.totbox{margin-top:14px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;display:flex;flex-direction:column;gap:6px}
.totbox .row{display:flex;justify-content:space-between;font-size:.9rem}
.totbox .row.grand{font-weight:800;font-size:1.08rem;color:var(--g700);border-top:1px solid var(--border);padding-top:8px;margin-top:4px}

/* ---------- TOASTS ---------- */
.toast-wrap{position:fixed;top:18px;right:18px;display:flex;flex-direction:column;gap:10px;z-index:200;max-width:340px}
.toast{background:var(--surface);border:1px solid var(--border);border-left:4px solid var(--g600);padding:13px 15px;border-radius:11px;box-shadow:var(--shadow-lg);display:flex;gap:10px;align-items:flex-start;animation:slideIn .28s cubic-bezier(.22,.61,.36,1)}
.toast.err{border-left-color:var(--danger)}.toast.warn{border-left-color:var(--warn)}.toast.info{border-left-color:var(--info)}
.toast .ti{flex:0 0 auto;margin-top:1px}
.toast strong{display:block;font-size:.88rem}
.toast span{font-size:.8rem;color:var(--muted)}
@keyframes slideIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:none}}

/* ---------- MISC ---------- */
.divider{height:1px;background:var(--border);margin:2px 0}
.stat-line{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border)}
.stat-line:last-child{border-bottom:0}
.progress{height:8px;background:var(--surface3);border-radius:20px;overflow:hidden}
.progress>i{display:block;height:100%;background:linear-gradient(90deg,var(--g600),var(--g400));border-radius:20px;transition:width .5s}
.callout{border-radius:12px;padding:14px 16px;display:flex;gap:12px;align-items:flex-start;font-size:.86rem;border:1px solid}
.callout.info{background:var(--info-bg);border-color:transparent;color:var(--info)}
.callout.warn{background:var(--warn-bg);border-color:transparent;color:var(--warn)}
.callout.green{background:var(--g100);border-color:transparent;color:var(--g700)}
.callout strong{display:block;margin-bottom:2px}
.callout .ctxt{color:var(--text)}
.callout .ctxt strong{display:inline;margin:0}
.gloss-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
.gloss{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:15px}
.gloss h4{font-size:.92rem;font-weight:800;color:var(--g700);display:flex;align-items:center;gap:8px;margin-bottom:6px}
.gloss p{font-size:.82rem;color:var(--muted);line-height:1.5}
.seg-bar{display:flex;height:34px;border-radius:9px;overflow:hidden;border:1px solid var(--border)}
.seg-bar>div{display:grid;place-items:center;color:#fff;font-size:.74rem;font-weight:700;min-width:0;overflow:hidden}
.funnel{display:flex;flex-direction:column;gap:7px}
.funnel-row{display:flex;align-items:center;gap:12px}
.funnel-bar{height:38px;border-radius:9px;display:flex;align-items:center;padding:0 14px;color:#fff;font-weight:700;font-size:.86rem;min-width:60px;transition:width .6s}
.funnel-meta{font-size:.8rem;color:var(--muted);white-space:nowrap}
.tabs{display:flex;gap:4px;background:var(--surface2);border:1px solid var(--border);border-radius:11px;padding:4px;width:fit-content;flex-wrap:wrap}
.tab{padding:7px 14px;border-radius:8px;font-size:.84rem;font-weight:700;color:var(--muted);cursor:pointer;border:0;background:transparent}
.tab.active{background:var(--surface);color:var(--g700);box-shadow:var(--shadow)}
.checklist{display:flex;flex-direction:column;gap:2px}
.check-item{display:flex;align-items:center;gap:11px;padding:10px;border-radius:10px;cursor:pointer;transition:background .12s}
.check-item:hover{background:var(--surface2)}
.check-box{width:21px;height:21px;border-radius:6px;border:2px solid var(--border);flex:0 0 auto;display:grid;place-items:center;transition:.14s}
.check-item.done .check-box{background:var(--g600);border-color:var(--g600);color:#fff}
.check-item.done .ctxt2{color:var(--muted);text-decoration:line-through}
.legend{display:flex;flex-wrap:wrap;gap:12px;font-size:.8rem}
.legend span{display:inline-flex;align-items:center;gap:6px;color:var(--muted)}
.legend i{width:11px;height:11px;border-radius:3px;display:inline-block}
.persona-card{display:flex;gap:14px;align-items:center;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:14px}
.persona-card .pav{width:54px;height:54px;border-radius:14px;display:grid;place-items:center;font-size:1.5rem;background:var(--g100);flex:0 0 auto}
.kv{display:grid;grid-template-columns:auto 1fr;gap:6px 16px;font-size:.86rem}
.kv dt{color:var(--muted);font-weight:600}
.kv dd{text-align:right;font-weight:700}

/* ---------- RESPONSIVE ---------- */
.menu-btn{display:none}
@media(max-width:1100px){.split,.cols-2,.hero,.form-grid{grid-template-columns:1fr}.cols-3,.cols-4{grid-template-columns:repeat(2,minmax(0,1fr))}.kpi strong{font-size:1.5rem}}
@media(max-width:640px){.cols-3,.cols-4{grid-template-columns:1fr}}
@media(max-width:880px){
  .app{grid-template-columns:1fr}
  .sidebar{position:fixed;left:0;top:0;z-index:90;width:min(86vw,300px);transform:translateX(-105%);transition:transform .26s}
  .app.nav-open .sidebar{transform:none}
  .app.nav-collapsed{grid-template-columns:1fr}
  .app.nav-collapsed .brand-txt,.app.nav-collapsed .nav-link .lbl,.app.nav-collapsed .nav-group{display:block}
  .menu-btn{display:inline-flex}
  .content{padding:16px}
  .header{padding:0 14px}
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:85;display:none}
  .app.nav-open .scrim{display:block}
  .line-row,.line-head{grid-template-columns:1fr 1fr;gap:7px}
}
@media print{
  .sidebar,.header,.toast-wrap,.no-print{display:none!important}
  .app{display:block}.content{padding:0;max-width:none}
  body{background:#fff}
}

/* ---------- PORTAL DO TITULAR ---------- */
.portal{min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:32px 18px;background:linear-gradient(160deg,var(--g100),var(--bg) 55%)}
#login{align-items:stretch;justify-content:stretch;padding:0;background:var(--surface);overflow:hidden}
.login-bg{flex:1;min-height:100vh;position:relative;background:linear-gradient(115deg,rgba(0,107,60,.34),rgba(3,60,36,.62)),var(--login-bg,url('background.jpg')) center/cover no-repeat,linear-gradient(150deg,var(--g800),var(--g600) 70%,var(--g400))}
.login-bg::after{content:"";position:absolute;inset:0;background:linear-gradient(100deg,transparent 50%,var(--surface) 100%)}
.login-panel{width:min(480px,100%);display:flex;align-items:center;justify-content:center;padding:40px;background:var(--surface)}
.login-card{width:100%;max-width:368px;animation:fade .35s ease}
.login-brand{display:flex;align-items:center;gap:13px;margin-bottom:32px}
.login-brand .brand-logo{width:46px;height:46px;flex:none;border-radius:11px;overflow:hidden;box-shadow:var(--shadow)}
.login-brand .brand-logo img{width:100%;height:100%;object-fit:contain}
.login-brand h1{font-size:1.14rem;font-weight:800;line-height:1.08}
.login-brand p{font-size:.74rem;color:var(--muted)}
.login-h{font-size:1.62rem;font-weight:800;margin-bottom:4px;letter-spacing:-.015em}
.login-sub{font-size:.88rem;color:var(--muted);margin-bottom:22px}
.login-card .field{margin-bottom:15px}
.login-btn{width:100%;margin-top:8px;padding:13px;font-size:.95rem;border-radius:11px;font-weight:700}
.login-err{color:var(--danger);font-size:.84rem;margin-top:10px;text-align:center;min-height:18px}
.login-portal{font-size:.84rem;color:var(--g700);font-weight:600;text-decoration:none}
.login-portal:hover{text-decoration:underline}
.login-credit{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:26px;padding-top:18px;border-top:1px solid var(--border);font-size:.75rem;color:var(--muted);text-decoration:none}
.login-credit:hover{color:var(--g700)}
.turma-chip{display:flex;align-items:center;justify-content:center;gap:6px;font-size:.72rem;font-weight:700;color:#fff;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);border-radius:8px;padding:6px 8px;margin-top:8px}
.login-sep{display:flex;align-items:center;gap:12px;margin:20px 0 16px;color:var(--muted2);font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em}
.login-sep::before,.login-sep::after{content:"";flex:1;height:1px;background:var(--border)}
.login-action{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;padding:12px;border:1px solid var(--border);border-radius:11px;background:var(--surface);color:var(--g700);font-weight:700;font-size:.9rem;text-decoration:none;cursor:pointer;transition:.16s}
.login-action:hover{border-color:var(--g400);background:var(--g50)}
.login-foot{display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;margin-top:20px;font-size:.82rem}
.login-foot .login-dot{color:var(--muted2)}
.login-tnote{display:flex;align-items:center;gap:8px;font-size:.78rem;color:var(--muted);background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:9px 12px;margin-bottom:20px}
.login-tnote strong{color:var(--text)}
@media(max-width:780px){.login-bg{display:none}.login-panel{width:100%}}
.portal-card{width:min(640px,100%);padding:26px;animation:fade .3s ease}
.portal-head{display:flex;align-items:center;gap:13px;margin-bottom:18px}
.portal-head h1{line-height:1.2}
.consent-opt{display:flex;align-items:flex-start;gap:12px;padding:13px;border:1px solid var(--border);border-radius:11px;cursor:pointer;transition:.14s;margin-bottom:9px;background:var(--surface2)}
.consent-opt:hover{border-color:var(--g400)}
.consent-opt input{margin-top:3px;width:18px;height:18px;accent-color:var(--g600);flex:0 0 auto}
.consent-opt .co-txt strong{display:block;font-size:.9rem}
.consent-opt .co-txt span{font-size:.8rem;color:var(--muted)}

/* ---------- SELETOR DE PERSONA (wizard) ---------- */
.persona-pick{display:flex;flex-direction:column;align-items:center;gap:4px;padding:14px 8px;border:2px solid var(--border);border-radius:13px;cursor:pointer;text-align:center;transition:.14s}
.persona-pick:hover{border-color:var(--g300)}
.persona-pick.on{border-color:var(--g600);background:var(--g100)}
.persona-pick .pav{width:42px;height:42px;border-radius:11px;display:grid;place-items:center;font-size:1.3rem;background:var(--surface2)}
.persona-pick strong{font-size:.84rem}

/* ---------- CONSTRUTOR DE MODELOS ---------- */
.tpl-editor{display:grid;grid-template-columns:340px 1fr;gap:16px;align-items:start}
.tpl-side{display:flex;flex-direction:column;gap:14px;position:sticky;top:80px}
.block-list{display:flex;flex-direction:column;gap:7px}
.block-row{display:flex;align-items:center;gap:9px;padding:9px 11px;border:1px solid var(--border);border-radius:10px;background:var(--surface2);cursor:pointer;transition:.12s}
.block-row:hover{border-color:var(--g300)}
.block-row.sel{border-color:var(--g600);background:var(--g100);box-shadow:0 0 0 2px rgba(0,166,81,.12)}
.block-row.dragging{opacity:.4}
.block-row.dragover{border-color:var(--g600);border-style:dashed}
.block-row .bhandle{color:var(--muted2);flex:0 0 auto;cursor:grab;display:flex}
.block-row .blabel{flex:1;font-weight:700;font-size:.84rem;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.block-row .bact{display:flex;gap:3px;flex:0 0 auto}
.block-row .bact button{width:24px;height:24px;border-radius:7px;border:1px solid var(--border);background:var(--surface);cursor:pointer;display:grid;place-items:center;color:var(--muted);font-size:.7rem;padding:0}
.block-row .bact button:hover{color:var(--text);border-color:var(--g300)}
.palette{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.palette button{justify-content:flex-start}
.tpl-preview-wrap{background:var(--surface3);border:1px solid var(--border);border-radius:14px;padding:22px;display:flex;justify-content:center;min-height:420px;overflow:auto}
.paper{background:#fff;width:100%;max-width:720px;min-height:540px;padding:38px;border-radius:6px;box-shadow:0 12px 34px rgba(0,0,0,.16);color:#15302a}
.tpl-thumb{height:150px;border:1px solid var(--border);border-radius:10px;overflow:hidden;background:#fff;position:relative}
.tpl-thumb-inner{position:absolute;top:0;left:0;width:265%;transform:scale(.377);transform-origin:top left;padding:20px;color:#15302a;pointer-events:none}
.tpl-card:hover{border-color:var(--g400);box-shadow:var(--shadow-lg)}
@media(max-width:980px){.tpl-editor{grid-template-columns:1fr}.tpl-side{position:static}}

/* ---------- BALÕES INFORMATIVOS (slides) ---------- */
.infotip{position:relative;display:inline-flex;align-items:center;cursor:help;vertical-align:middle;margin-left:5px;outline:none}
.infotip-ic{display:inline-grid;place-items:center;width:18px;height:18px;border-radius:50%;background:var(--warn-bg);color:var(--warn);transition:transform .14s,background .14s;box-shadow:0 0 0 2px transparent}
.infotip:hover .infotip-ic,.infotip:focus .infotip-ic{background:var(--warn);color:#fff;transform:scale(1.12);box-shadow:0 0 0 3px var(--warn-bg)}
.infotip-pop{position:fixed;left:0;top:0;width:288px;max-width:82vw;background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow-lg);padding:12px 14px;opacity:0;pointer-events:none;transition:opacity .16s;z-index:3000;display:flex;flex-direction:column;gap:6px;text-align:left;font-weight:400;white-space:normal;text-transform:none;letter-spacing:normal}
.infotip:hover .infotip-pop,.infotip:focus .infotip-pop,.infotip:focus-within .infotip-pop{opacity:1;pointer-events:auto}
.infotip-pop strong{font-size:.85rem;color:var(--text);line-height:1.35}
.infotip-pop .ix{font-size:.79rem;color:var(--muted);line-height:1.5}
.infotip-pop .ref{font-size:.72rem;color:var(--g700);font-weight:700;display:flex;align-items:center;gap:5px;border-top:1px solid var(--border);padding-top:7px;margin-top:1px}
.delta-cmp{font-size:.74rem;font-weight:700;display:inline-flex;align-items:center;gap:3px}

.search-results .sr-item{display:flex;align-items:center;gap:10px;padding:9px 11px;cursor:pointer;color:#fff;border-bottom:1px solid rgba(255,255,255,.08)}

  crm:{t:'CRM — Customer Relationship Management',x:'Conjunto de Processos, Tecnologias e Comportamentos centrados no cliente. "O CRM não é um mero arquivo de dados."',r:'Referencial 10868 — CRM Analytics, pág. 68'},

/* Posiciona o balão pedagógico em coordenadas fixas (escapa a caixas com overflow:hidden) */
function placeInfotip(tip){
  const pop=tip.querySelector('.infotip-pop'); if(!pop) return;
  const r=tip.getBoundingClientRect();
  const pw=pop.offsetWidth||288, ph=pop.offsetHeight||130;
  let left=r.left+r.width/2-pw/2;
  left=Math.max(8,Math.min(left,window.innerWidth-pw-8));
  let top=r.top-ph-10; if(top<8) top=r.bottom+10;
  pop.style.left=left+'px'; pop.style.top=top+'px';
}
document.addEventListener('mouseover',e=>{ const t=e.target.closest&&e.target.closest('.infotip'); if(t) placeInfotip(t); },true);

/* ---------- taxas de IVA ---------- */
function ivaRates(){ return (state.settings&&state.settings.ivaRates)||[]; }
function ivaOptions(sel){ return ivaRates().map(r=>`<option value="${r.taxa}" ${Number(sel)===Number(r.taxa)?'selected':''}>${r.taxa}% — ${esc(r.regiao)} ${esc(r.tipo)}</option>`).join(''); }
function defaultIva(){ const r=ivaRates().find(x=>x.taxa===23)||ivaRates()[0]; return r?r.taxa:23; }
function regiaoTaxas(reg){ return ivaRates().filter(r=>r.regiao===reg).map(r=>Number(r.taxa)); }

/* ---------- validação de NIF português ---------- */
function validNIF(nif){
  nif=String(nif||'').trim(); if(!/^\d{9}$/.test(nif)) return false;
  if(!'1235689'.includes(nif[0])) return false;
  let s=0; for(let i=0;i<8;i++) s+=Number(nif[i])*(9-i);
  let c=11-(s%11); if(c>=10) c=0;
  return c===Number(nif[8]);
}

/* ---------- IVA por região ---------- */
function ivaTipo(taxa){ const r=ivaRates().find(x=>Number(x.taxa)===Number(taxa)); return r?r.tipo:'Normal'; }
function ivaForRegion(taxa, regiao){ const tipo=ivaTipo(taxa); const r=ivaRates().find(x=>x.regiao===regiao && x.tipo===tipo); return r?Number(r.taxa):Number(taxa); }

/* ---------- numeração de propostas por ano ---------- */
function nextProposalNumber(){
  const y=todayISO().slice(0,4); const prefix='PROP-'+y+'-';
  const nums=(state.propostas||[]).filter(p=>String(p.numero||'').startsWith(prefix)).map(p=>parseInt(String(p.numero).slice(prefix.length),10)||0);
  return prefix+pad((nums.length?Math.max(...nums):0)+1,3);
}

/* ---------- ocultar valores financeiros por grupo ---------- */
function canSeeFinance(){ if(!state.settings.requireLogin) return true; const r=currentRole(); return !(r&&r.ocultarFinanceiro); }
function money(n){ return canSeeFinance()?fmt(n):'🔒'; }

/* ---------- desconto de loyalty + totais da proposta ---------- */
function clientDiscount(clienteId){ const c=getC(clienteId); if(!c) return 0; const lv=(state.loyalty||[]).find(l=>l.nome===c.loyalty); return lv?Number(lv.desconto||0):0; }
function proposalTotals(p){
  const sub=(p.linhas||[]).reduce((s,l)=>s+(+l.qtd||0)*(+l.preco||0),0);
  const pct=clientDiscount(p.clienteId);
  const desconto=sub*pct/100;
  const iva=(p.linhas||[]).reduce((s,l)=>{ const net=(+l.qtd||0)*(+l.preco||0)*(1-pct/100); return s+net*(+l.iva||0)/100; },0);
  return {sub, descontoPct:pct, desconto, base:sub-desconto, iva, total:sub-desconto+iva};
}

let _i18nObs=null; const _i18nNodes=new Set(); const _i18nAttrEls=new Set();
function getLang(){ const u=(typeof currentUser==='function')?currentUser():null; if(u&&u.lang) return u.lang; return localStorage.getItem(LANG_KEY)||'pt'; }
function setLang(l){ l=(l==='en')?'en':'pt'; localStorage.setItem(LANG_KEY,l); const u=currentUser&&currentUser(); if(u){ u.lang=l; save(); } render(); startI18n(); }
function _trAttrs(el){ ['placeholder','title','aria-label'].forEach(a=>{ if(el.hasAttribute&&el.hasAttribute(a)){ const cur=el.getAttribute(a); const v=(cur||'').trim(); if(v&&I18N_EN[v]){ if(!el.__ptA) el.__ptA={}; if(el.__ptA[a]==null){ el.__ptA[a]=cur; _i18nAttrEls.add(el); } el.setAttribute(a,I18N_EN[v]); } } }); }
function _trText(tn){
  if(tn.__ptK!=null) return; const raw=tn.nodeValue; const k=raw.trim(); if(!k) return;
  let v=I18N_EN[k];
  if(!v && /\s*\*$/.test(k)){ const base=k.replace(/\s*\*$/,'').trim(); if(I18N_EN[base]) v=I18N_EN[base]+' *'; }
  if(v){ tn.__ptK=raw; tn.nodeValue=raw.replace(k,v); _i18nNodes.add(tn); }
}
function translateTree(node){
  if(!node) return;
  if(node.nodeType===3){ _trText(node); return; }
  if(node.nodeType!==1) return;
  _trAttrs(node); node.querySelectorAll('[placeholder],[title],[aria-label]').forEach(_trAttrs);
  const w=document.createTreeWalker(node,NodeFilter.SHOW_TEXT,null); const arr=[]; let t; while(t=w.nextNode()) arr.push(t);
  arr.forEach(_trText);
}
function untranslateAll(){
  _i18nNodes.forEach(tn=>{ if(tn.__ptK!=null){ tn.nodeValue=tn.__ptK; tn.__ptK=null; } }); _i18nNodes.clear();
  _i18nAttrEls.forEach(el=>{ if(el.__ptA){ for(const a in el.__ptA){ if(el.__ptA[a]!=null) el.setAttribute(a,el.__ptA[a]); } el.__ptA=null; } }); _i18nAttrEls.clear();
}
function startI18n(){
  const lb=$('#langBtn'); if(lb) lb.textContent=(getLang()==='en')?'EN':'PT';
  if(getLang()==='en') translateTree(document.body); else untranslateAll();
  if(!_i18nObs){
    _i18nObs=new MutationObserver(ms=>{ if(getLang()!=='en') return; for(const m of ms){ for(const nn of m.addedNodes){ translateTree(nn); } } });
    _i18nObs.observe(document.body,{childList:true,subtree:true});
  }
}

let state;
function load(){
  try{ const s=localStorage.getItem(STORE_KEY); state = s?JSON.parse(s):demoData(); }
  catch(e){ state = demoData(); }
  // migração defensiva: garantir coleções esperadas
  const def=demoData();
  Object.keys(def).forEach(k=>{ if(state[k]==null) state[k]=def[k]; });
  if(!state.checklistRGPD||typeof state.checklistRGPD!=='object') state.checklistRGPD={};
  if(!state.settings) state.settings=def.settings;
  if(state.settings.requireLogin==null) state.settings.requireLogin=true;
  if(!Array.isArray(state.settings.ivaRates)||!state.settings.ivaRates.length) state.settings.ivaRates=def.settings.ivaRates;
  if(!Array.isArray(state.settings.origens)||!state.settings.origens.length) state.settings.origens=def.settings.origens;
  if(!state.settings.emailjs||typeof state.settings.emailjs!=='object') state.settings.emailjs=Object.assign({},EMAILJS_DEFAULT);
  if(state.settings.emailjs && !state.settings.emailjs.serviceId && !state.settings.emailjs.templateId && !state.settings.emailjs.publicKey) state.settings.emailjs=Object.assign({},EMAILJS_DEFAULT);
  { const adm=state.utilizadores.find(u=>u.id==='u1'); if(adm && adm.apelido==='Vale') adm.apelido='du Valle'; }
  Object.values(state.roles||{}).forEach(r=>{ if(r&&Array.isArray(r.modules)&&!r.modules.includes('email')&&(r.gestor||r.modules.includes('campanhas'))) r.modules.push('email'); });
  // --- Empresas & Contactos (modelo Account/Contact) — migração additiva ---
  if(!Array.isArray(state.empresas)) state.empresas=[];
  if(state.settings.empSeq==null) state.settings.empSeq=0;
  if(state.settings.cacBudget==null) state.settings.cacBudget=2000;
  if(!state.empresas.length && Array.isArray(state.clientes) && state.clientes.length){
    const byName={};
    state.clientes.forEach(c=>{ const nm=(c.empresa||'').trim(); if(!nm) return; if(!byName[nm]){ const e={id:uid('emp'),numero:'E'+pad(++state.settings.empSeq,3),nome:nm,nipc:c.nif||'',cae:'',setor:'',dimensao:c.segmento||'PME',moradaFiscal:'',codigoPostal:'',cidade:c.cidade||'',regiao:c.regiao||'Continente',website:'',telefone:'',email:'',notas:'',criado:c.criado||todayISO()}; byName[nm]=e; state.empresas.push(e); } });
  }
  if(Array.isArray(state.clientes)) state.clientes.forEach(c=>{ if(!c.empresaId && (c.empresa||'').trim()){ const e=state.empresas.find(x=>x.nome===c.empresa.trim()); if(e) c.empresaId=e.id; } });
  Object.values(state.roles||{}).forEach(r=>{ if(r&&Array.isArray(r.modules)&&!r.modules.includes('empresas')&&(r.gestor||r.modules.includes('clientes'))) r.modules.push('empresas'); });
  // --- Agenda & Tarefas ---
  if(!Array.isArray(state.tarefas)) state.tarefas=[];
  if(!state.tarefas.length && Array.isArray(state.clientes) && state.clientes.length){
    const c=state.clientes;
    state.tarefas.push({id:uid('tk'),titulo:'Ligar para follow-up da proposta',tipo:'Chamada',data:todayISO(),hora:'10:00',clienteId:c[0].id,estado:'Pendente',notas:'',criadoPor:'u1',criadoEm:todayISO()});

    state.tarefas.push({id:uid('tk'),titulo:'Enviar proposta revista',tipo:'Email',data:addDays(todayISO(),-1),hora:'',clienteId:(c[2]||c[0]).id,estado:'Pendente',notas:'',criadoPor:'u1',criadoEm:todayISO()});
  }
  Object.values(state.roles||{}).forEach(r=>{ if(r&&Array.isArray(r.modules)&&!r.modules.includes('agenda')&&(r.gestor||r.modules.includes('clientes'))) r.modules.push('agenda'); });
  if(!Array.isArray(state.activityLog)) state.activityLog=[];
  if(!state.settings.brand||typeof state.settings.brand!=='object') state.settings.brand={nome:'',cor:'',logo:'',loginBg:''};
  Object.values(state.roles||{}).forEach(r=>{ if(r&&Array.isArray(r.modules)&&!r.modules.includes('alertas')&&(r.gestor||r.modules.includes('dashboard'))) r.modules.push('alertas'); });
  if(state.settings.baseURL==null) state.settings.baseURL='base.json';
  if(state.settings.entregaURL==null) state.settings.entregaURL='';
  // o admin/criador (Diogo Vale) fica sempre protegido e associado ao LinkedIn
  { const adm=(state.utilizadores||[]).find(u=>u.id==='u1'); if(adm){ adm.protegido=true; adm.linkedin='https://www.linkedin.com/in/ldvale/'; } }
  if(!state.roles||!Object.keys(state.roles).length) state.roles=def.roles;
  if(!Array.isArray(state.propostaTemplates)||!state.propostaTemplates.length) state.propostaTemplates=def.propostaTemplates;
  // migração de permissões: gestores veem tudo; Comercial ganha 'modelos' (formandos não, por defeito)
  Object.entries(state.roles||{}).forEach(([name,r])=>{ r.modules=r.modules||[]; if(r.gestor){ NAV_FLAT.forEach(n=>{ if(!r.modules.includes(n.id)) r.modules.push(n.id); }); } else if(name==='Comercial' && !r.modules.includes('modelos')) r.modules.push('modelos'); });
  // garantir que cada modelo tem blocos (construtor por blocos)
  (state.propostaTemplates||[]).forEach(t=>{ if(!Array.isArray(t.blocks)||!t.blocks.length) t.blocks=blocksFromLegacy(t); });
  // associar linhas de proposta ao catálogo (produtoId)
  (state.propostas||[]).forEach(p=>{ (p.linhas||[]).forEach(l=>{ if(!l.produtoId){ const pr=(state.produtos||[]).find(x=>x.nome===l.descricao); if(pr) l.produtoId=pr.id; } }); });
  (state.clientes||[]).forEach(c=>{ if(!c.regiao) c.regiao='Continente'; });
  if(!Array.isArray(state.envios)) state.envios=[];
  if(!Array.isArray(state.automacoes)) state.automacoes=def.automacoes;
  if(!Array.isArray(state.agendamentos)) state.agendamentos=[];
  (state.automacoes||[]).forEach(a=>{ if(!a.condSegmento) a.condSegmento='Todos'; if(!Array.isArray(a.passos)) a.passos=a.templateId?[{templateId:a.templateId,atrasoDias:a.atrasoDias||0}]:[]; });
  // migrar templates de email antigos para o novo modelo
  (state.templates||[]).forEach(t=>{ if(t.cor==null)t.cor='#006B3C'; if(t.mostrarLogo==null)t.mostrarLogo=true; if(t.saudacao==null)t.saudacao='Olá {{cliente.nome}},'; if(t.corpo==null)t.corpo=''; if(t.botaoTexto==null)t.botaoTexto=''; if(t.botaoLink==null)t.botaoLink=''; if(t.assinatura==null)t.assinatura='{{entidade.nome}}'; });
  (state.propostas||[]).forEach(p=>{ if(!p.criadoPor)p.criadoPor=null; if(!p.alteradoEm)p.alteradoEm=p.criada; });
  // dados antigos (pré-login) sem credenciais → repor contas demo (mantém clientes/propostas/etc.)
  if(!Array.isArray(state.utilizadores) || !state.utilizadores.length || state.utilizadores.some(u=>!u.username||!u.password)){
    state.utilizadores=def.utilizadores; state.roles=def.roles;
  }
  // restaurar sessão
  try{ const sid=localStorage.getItem(SESSION_KEY); if(sid&&state.utilizadores.some(u=>u.id===sid)) sessionUserId=sid; }catch(e){}
  try{ processAgendamentos(); }catch(e){}
}

/* ---------- gráficos SVG ---------- */
function donut(segs, size=148){
  const total=segs.reduce((s,x)=>s+x.v,0)||1; const r=size/2-14, cx=size/2, cy=size/2, C=2*Math.PI*r; let off=0;
  const arcs=segs.filter(s=>s.v>0).map(s=>{ const len=s.v/total*C; const el=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.c}" stroke-width="20" stroke-dasharray="${len} ${C-len}" stroke-dashoffset="${-off}" transform="rotate(-90 ${cx} ${cy})" stroke-linecap="butt"/>`; off+=len; return el; }).join('');
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}"><circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--surface3)" stroke-width="20"/>${arcs}<text x="${cx}" y="${cy-2}" text-anchor="middle" font-size="22" font-weight="800" fill="var(--text)">${fmtN(total)}</text><text x="${cx}" y="${cy+16}" text-anchor="middle" font-size="10" fill="var(--muted)">TOTAL</text></svg>`;
}
function barShort(v){ if(!v) return ''; return v>=1000?(v/1000).toFixed(v>=10000?0:1).replace('.',',')+'k€':Math.round(v)+'€'; }
function bars(data, h=150){
  const max=Math.max(...data.map(d=>d.v),1);
  return `<div class="barchart">
    <div class="barchart-plot" style="height:${h}px">
      ${data.map(d=>{const p=Math.round(d.v/max*100); return `<div class="barchart-col" title="${esc(d.l)}: ${money(d.v)}"><div class="barchart-val">${barShort(d.v)}</div><div class="barchart-fill" style="height:${d.v?Math.max(3,p):0}%"></div></div>`;}).join('')}
    </div>
    <div class="barchart-labels">${data.map(d=>`<div>${esc(d.l)}</div>`).join('')}</div>
  </div>`;
}
function ring(p, size=78, label=''){
  const r=size/2-8, c=2*Math.PI*r, v=Math.max(0,Math.min(100,p));
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}"><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="rgba(255,255,255,.25)" stroke-width="8"/><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#fff" stroke-width="8" stroke-linecap="round" stroke-dasharray="${v/100*c} ${c}" transform="rotate(-90 ${size/2} ${size/2})"/><text x="${size/2}" y="${size/2+2}" text-anchor="middle" font-size="17" font-weight="800" fill="#fff">${Math.round(v)}%</text>${label?`<text x="${size/2}" y="${size/2+15}" text-anchor="middle" font-size="8" fill="rgba(255,255,255,.8)">${label}</text>`:''}</svg>`;
}

function monthlyRevenue(props){
  props=props||state.propostas;
  const m={}; const names=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  props.filter(p=>p.estado==='Ganha').forEach(p=>{ const mi=+(p.criada||'').slice(5,7)-1; if(mi>=0){m[mi]=(m[mi]||0)+propTotal(p);} });
  const keys=Object.keys(m).map(Number).sort((a,b)=>a-b);
  if(!keys.length) return [{l:'—',v:0}];
  const lo=Math.min(...keys), hi=Math.max(...keys); const out=[];
  for(let i=lo;i<=hi;i++) out.push({l:names[i],v:m[i]||0});
  return out;
}

/* ---------- Paginação reutilizável ---------- */
let _pages={};
const PAGE_SIZE=12;
function paginate(list,key){
  const total=list.length; const pages=Math.max(1,Math.ceil(total/PAGE_SIZE));
  let p=_pages[key]||1; if(p>pages)p=pages; if(p<1)p=1; _pages[key]=p;
  const start=(p-1)*PAGE_SIZE; const slice=list.slice(start,start+PAGE_SIZE);
  return {slice,p,pages,total,start};
}
function pager(key,pg){
  const {p,pages,total,start,slice}=pg; if(total===0) return '';
  const info=`${start+1}–${start+slice.length} de ${total}`;
  if(pages<=1) return `<div class="pager"><span class="pager-info">${total} registo(s)</span></div>`;
  let nums=''; const win=2; const lo=Math.max(1,p-win), hi=Math.min(pages,p+win);
  if(lo>1){ nums+=`<button class="pg-num" data-act="page" data-key="${key}" data-p="1">1</button>`; if(lo>2) nums+=`<span class="pg-dots">…</span>`; }
  for(let i=lo;i<=hi;i++) nums+=`<button class="pg-num${i===p?' active':''}" data-act="page" data-key="${key}" data-p="${i}">${i}</button>`;
  if(hi<pages){ if(hi<pages-1) nums+=`<span class="pg-dots">…</span>`; nums+=`<button class="pg-num" data-act="page" data-key="${key}" data-p="${pages}">${pages}</button>`; }
  return `<div class="pager">
    <span class="pager-info">${info}</span>
    <div class="pager-btns">
      <button class="btn-sec btn-xs" data-act="page" data-key="${key}" data-p="${p-1}" ${p<=1?'disabled':''}>‹ Anterior</button>
      ${nums}
      <button class="btn-sec btn-xs" data-act="page" data-key="${key}" data-p="${p+1}" ${p>=pages?'disabled':''}>Seguinte ›</button>
    </div>
  </div>`;
}

    <div class="section-head" style="margin-bottom:14px"><div><h3>Pedidos dos titulares de dados</h3><div class="sub">Direitos: acesso, retificação, apagamento, portabilidade, oposição e limitação. Prazo de resposta: 1 mês.</div></div><button class="btn" data-act="new" data-type="pedido">+ Pedido</button></div>

      ${peds.map(p=>{const atras=p.estado!=='Concluído'&&daysBetween(todayISO(),p.prazo)<0;const dleft=daysBetween(todayISO(),p.prazo);return `<tr><td class="cell-main">${esc(clientName(p.clienteId))}</td><td><span class="pill purple">${esc(p.tipo)}</span></td><td>${dPT(p.data)}</td><td>${dPT(p.prazo)} ${p.estado!=='Concluído'?`<span class="muted" style="font-size:.74rem">(${atras?'<b style="color:var(--danger)">atrasado</b>':dleft+' d'})</span>`:''}</td><td><span class="pill ${p.estado==='Concluído'?'green':p.estado==='Em curso'?'amber':'blue'}">${esc(p.estado)}</span></td><td><div class="row-actions"><button class="btn-sec btn-xs" data-act="edit" data-type="pedido" data-id="${p.id}">Editar</button><button class="btn-danger btn-xs" data-act="delete" data-type="pedido" data-id="${p.id}">✕</button></div></td></tr>`;}).join('')||`<tr><td colspan="6">${empty(act?'Sem pedidos no período':'Sem pedidos')}</td></tr>`}
    </tbody></table></div>`;
  if(tab==='ropa') return `
    <div class="section-head" style="margin-bottom:14px"><div><h3>Registo de Atividades de Tratamento (RoPA) ${infoTip('ropa')}</h3><div class="sub">Art. 30.º RGPD — documento que demonstra o cumprimento (responsabilização).</div></div><button class="btn" data-act="new" data-type="ropa">+ Atividade</button></div>
    <div class="grid" style="gap:14px">${state.ropa.map(r=>`<div class="card card-pad" style="box-shadow:none;border-color:var(--border)"><div class="section-head" style="margin-bottom:10px"><div><h3 style="font-size:.98rem">${esc(r.atividade)}</h3><div class="sub">${esc(r.finalidade)}</div></div><div class="row-actions"><button class="btn-sec btn-xs" data-act="edit" data-type="ropa" data-id="${r.id}">Editar</button><button class="btn-danger btn-xs" data-act="delete" data-type="ropa" data-id="${r.id}">✕</button></div></div><dl class="kv" style="grid-template-columns:auto 1fr;gap:6px 14px"><dt>Titulares</dt><dd style="text-align:left">${esc(r.titulares)}</dd><dt>Categorias</dt><dd style="text-align:left">${esc(r.categorias)}</dd><dt>Base legal</dt><dd style="text-align:left"><span class="chip">${esc(r.base)}</span></dd><dt>Conservação</dt><dd style="text-align:left">${esc(r.conservacao)}</dd><dt>Destinatários</dt><dd style="text-align:left">${esc(r.destinatarios)}</dd><dt>Segurança</dt><dd style="text-align:left">${esc(r.seguranca)}</dd></dl></div>`).join('')||empty('Sem atividades registadas')}</div>`;

    </tbody></table></div>`;
  /* checklist + glossário */
  const checks=[
    'Levantamento de todos os dados pessoais tratados',

    'Política de privacidade clara, concisa e acessível',

    'Procedimento de resposta a pedidos de titulares (1 mês)',

    'Designar Encarregado de Proteção de Dados (EPD) quando aplicável',
    'Privacidade desde a conceção (by design) e por defeito',

    ['Privacy by Design','Integrar a privacidade na base de um sistema, desde a conceção e por defeito.'],
    ['Violação de dados','Quebra de segurança que provoque destruição, perda, alteração ou acesso não autorizado a dados pessoais.'],
  ];
  const done=state.checklistRGPD||{};
  const total=checks.length, dCount=checks.filter((_,i)=>done[i]).length;
  return `
    <div class="section-head" style="margin-bottom:14px"><div><h3>Checklist de conformidade RGPD</h3><div class="sub">Ciclo de vida da implementação — ${dCount}/${total} concluídos</div></div></div>

    <div class="section-head" style="margin-bottom:14px"><div><h3>Glossário RGPD</h3><div class="sub">Conceitos-chave da UFCD 10870</div></div></div>

function emailjsCfg(){ return state.settings.emailjs||{}; }
function emailjsActive(){ const c=emailjsCfg(); return !!(c.ativo && c.serviceId && c.templateId && c.publicKey); }
function canSendReal(){ const u=currentUser(); return !u || u.papel!=='Formando'; }
function realSendOn(){ return emailjsActive() && canSendReal(); }
function loadEmailJS(){
  return new Promise((res,rej)=>{
    if(window.emailjs){ try{ window.emailjs.init({publicKey:emailjsCfg().publicKey}); }catch(e){} return res(window.emailjs); }
    const s=document.createElement('script'); s.src='https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js';
    s.onload=()=>{ try{ window.emailjs.init({publicKey:emailjsCfg().publicKey}); }catch(e){} res(window.emailjs); };
    s.onerror=()=>rej(new Error('Não foi possível carregar o EmailJS (sem internet?)'));
    document.head.appendChild(s);
  });
}
function emailParams(o){ const s=state.settings; return { to_email:o.toEmail||'', to_name:o.toName||'', subject:o.subject||'', message:o.message||'', from_name:s.entidade||'', reply_to:s.email||'', cc:o.cc||'', bcc:o.bcc||'' }; }
function sendViaEmailJS(o){ const c=emailjsCfg(); return loadEmailJS().then(ej=>ej.send(c.serviceId, c.templateId, emailParams(o), {publicKey:c.publicKey})); }
function sendTestEmailJS(){
  if(!emailjsActive()){ toast('Configure primeiro','Preencha os 3 campos e ative o modo real','warn'); return; }
  const to=(currentUser()&&currentUser().email)||state.settings.email||''; if(!to){ toast('Sem destinatário','Defina o email da entidade','warn'); return; }
  toast('A enviar teste…','via EmailJS','info');

    .then(()=>toast('Teste enviado',`Verifique a caixa de ${to}`))
    .catch(err=>toast('Falha no teste',String(err&&(err.text||err.message)||err),'err'));

function fireAutomations(trigger, ctx){
  let fired=0, immediate=0, agendados=0; const cli=getC(ctx.clienteId);
  (state.automacoes||[]).filter(a=>a.estado==='Ativa'&&a.trigger===trigger).forEach(a=>{
    if(a.condSegmento && a.condSegmento!=='Todos' && (!cli || cli.segmento!==a.condSegmento)) return;
    (a.passos||[]).forEach((p,idx)=>{
      if(!p.templateId) return;
      if((+p.atrasoDias||0)<=0){ sendEmail({clienteId:ctx.clienteId, templateId:p.templateId, proposta:(trigger!=='novo-cliente')?ctx.proposta:null, origem:'Automação', automacaoId:a.id}); immediate++; }
      else { scheduleSend({dataAgendada:addDays(todayISO(),+p.atrasoDias), clienteId:ctx.clienteId, templateId:p.templateId, propostaId:(trigger!=='novo-cliente'&&ctx.proposta)?ctx.proposta.id:null, automacaoId:a.id, nome:a.nome+' (passo '+(idx+1)+')'}); agendados++; }
    });
    a.disparos=(a.disparos||0)+1; fired++;
  });
  if(fired){ save(); toast('Automação',`${immediate} enviado(s)${agendados?` · ${agendados} agendado(s)`:''}`,'info'); }
  return fired;
}
function scheduleSend(o){ state.agendamentos.push({id:uid('ag'),dataAgendada:o.dataAgendada,clienteId:o.clienteId,templateId:o.templateId,propostaId:o.propostaId||null,automacaoId:o.automacaoId||null,nome:o.nome||'Agendado'}); }
function processAgendamentos(){
  const today=todayISO(); const due=(state.agendamentos||[]).filter(a=>a.dataAgendada<=today); let n=0;
  due.forEach(a=>{ const prop=a.propostaId?state.propostas.find(p=>p.id===a.propostaId):null; sendEmail({clienteId:a.clienteId,templateId:a.templateId,proposta:prop,origem:'Automação',automacaoId:a.automacaoId}); n++; });
  if(n){ state.agendamentos=state.agendamentos.filter(a=>a.dataAgendada>today); save(); }
  return n;
}
function sendAgendamentoNow(id){
  const a=state.agendamentos.find(x=>x.id===id); if(!a) return;
  const prop=a.propostaId?state.propostas.find(p=>p.id===a.propostaId):null;

function sendCampaign(id){
  const cp=state.campanhas.find(c=>c.id===id); if(!cp) return;
  const alvo=state.clientes.filter(c=>cp.segmento==='Todos'||c.segmento===cp.segmento);

  save(); render(); toast('Campanha enviada',`${alvo.length} enviados · ${ab} abertos · ${cl} cliques`);
}

    </tbody></table></div>

    <div class="callout info" style="margin-top:14px">${ic('alert',16)}<div class="ctxt"><strong>Sobre o controlo de leitura:</strong> a abertura é detetada por um <strong>pixel de rastreio</strong> (imagem invisível no email). Neste ambiente de formação a métrica é <strong>simulada</strong>. O rastreio real — e saber se foi <em>apagado sem ler</em> — exige um servidor próprio (ver sugestões). Nota RGPD: muitos clientes bloqueiam imagens, por isso "não aberto" nem sempre significa que não leram.</div></div>
  </div>`;

function mailSend(){
  syncMailDraft();
  const c=mailDraft.clienteId?getC(mailDraft.clienteId):null;
  const to=c?c.email:(mailDraft.toEmail||'');
  if(!to){ toast('Sem destinatário','Escolha um cliente da lista','warn'); return; }
  if(!String(mailDraft.subject||'').trim()){ toast('Sem assunto','Escreva um assunto','warn'); return; }
  if(!hasSignature()){ if(!confirm('Não tem uma assinatura de email configurada no seu perfil.\n\nQuer enviar mesmo assim?')){ toast('Configure a assinatura','Clique no seu nome (canto inferior esquerdo) → Assinatura de email','info'); return; } }
  const subj=mergeCtx(mailDraft.subject,c,null);
  const sigT=sigHtmlToText((currentUser()||{}).assinatura);
  const msg=mergeCtx(mailDraft.message,c,null)+(sigT?'\n\n'+mergeCtx(sigT,c,null):'');
  const ev=sendEmail({clienteId:c?c.id:null, paraNome:c?`${c.nome} ${c.apelido||''}`.trim():to, paraEmail:to, templateId:null, assunto:subj, origem:'Manual'});
  const real=realSendOn(); ev.modo=real?'real':'simulado'; if(mailDraft.cc)ev.cc=mailDraft.cc; if(mailDraft.bcc)ev.bcc=mailDraft.bcc;
  const _cc=mailDraft.cc, _bcc=mailDraft.bcc;
  mailDraft=defaultMailDraft(); applyMailTemplate(); save(); render();
  if(real){
    toast('A enviar email real…','via EmailJS','info');
    sendViaEmailJS({toEmail:to,toName:ev.paraNome,subject:subj,message:msg,cc:_cc,bcc:_bcc})
      .then(()=>{ ev.estado='Enviado'; save(); toast('Email enviado',`Para ${to}`); render(); })
      .catch(err=>{ ev.estado='Falhou'; save(); toast('Falha no envio real',String(err&&(err.text||err.message)||err),'err'); render(); });
  } else { toast('Email registado',`Para ${ev.paraNome} (simulado)`); }
}

function rosterAdd(){
  const f=$('#rosterAddForm'); if(!f) return;
  const g=n=>((f.querySelector('[name="'+n+'"]')||{}).value||'').trim();
  const nome=g('nome'), apelido=g('apelido'), email=g('email'); let username=g('username'); const password=g('password'); const papel=g('papel')||'Formando';
  if(!nome){ toast('Falta o nome','Indique o nome do formando','warn'); return; }
  if(!password){ toast('Falta a palavra-passe','Defina uma palavra-passe','warn'); return; }
  if(!username) username=slugUser(nome,apelido);
  const btn=f.querySelector('[data-act="roster-add"]'); if(btn){ btn.disabled=true; btn.textContent='A adicionar…'; }
  const reset=()=>{ const b=$('#rosterAddForm [data-act="roster-add"]'); if(b){ b.disabled=false; b.innerHTML=ic('users',16)+' Adicionar à turma'; } };
  supaAddFormando({username,password,nome,apelido,email,papel}).then(()=>{
    toast('Adicionado à turma',username); ['nome','apelido','email','username','password'].forEach(n=>{const el=f.querySelector('[name="'+n+'"]'); if(el) el.value='';}); renderTurmaRoster(); reset();
  }).catch(e=>{ toast('Erro',supaMsg(e),'err'); reset(); });
}
function importTurmaCSV(file){
  const initPwd=(($('#rosterInitPwd')||{}).value||'').trim()||'iefp2026';
  const r=new FileReader();
  r.onload=async e=>{
    let rows; try{ rows=parseCSV(e.target.result); }catch(err){ toast('Erro no ficheiro','Verifique o formato','err'); return; }
    if(!rows||rows.length<2){ toast('Ficheiro vazio','Use o modelo e preencha pelo menos uma linha','warn'); return; }
    const head=rows[0].map(h=>h.trim().toLowerCase()); const idx=n=>head.indexOf(n);
    const c={nome:idx('nome'),apelido:idx('apelido'),email:idx('email'),username:idx('username'),password:idx('password'),papel:idx('papel')};
    if(c.nome<0){ toast('Ficheiro inválido','Falta a coluna "nome"','err'); return; }
    toast('A importar…','Aguarde um momento',''); let ok=0,fail=0; const errs=[];
    for(const cols of rows.slice(1)){
      const g=k=>c[k]>=0?(cols[c[k]]||'').trim():'';
      const nome=g('nome'); if(!nome) continue;
      const apelido=g('apelido'), email=g('email'); let username=g('username'); let password=g('password'); let papel=g('papel')||'Formando';
      if(papel!=='Formador'&&papel!=='Formando') papel='Formando';
      if(!username) username=slugUser(nome,apelido);
      if(!password) password=initPwd;
      try{ await supaAddFormando({username,password,nome,apelido,email,papel}); ok++; }
      catch(err){ fail++; errs.push(username+': '+supaMsg(err)); }
    }
    renderTurmaRoster();
    toast('Importação concluída',`${ok} criado(s)${fail?` · ${fail} falhou(aram)`:''}`,fail?'warn':'ok');
    if(errs.length) console.warn('Erros de importação:',errs);
  };
  r.readAsText(file);
}

function fieldHTML(f,item){
  let v=item[f.n]!=null?item[f.n]:(f.def!=null?f.def:'');
  const cls='field'+(f.full?' full':'');
  const hint=f.hint?`<span class="hint">${esc(f.hint)}</span>`:'';
  if(f.type==='select'){
    const opts=typeof f.opts==='function'?f.opts():f.opts;
    return `<div class="${cls}"><label>${esc(f.l)}</label><select name="${f.n}">${opt(opts,v)}</select>${hint}</div>`;
  }
  if(f.type==='avatar'){ const ini=initialsOf(item); return `<div class="${cls}"><label>${esc(f.l)}</label><div style="display:flex;align-items:center;gap:14px"><div id="avPreview" class="avatar" style="width:58px;height:58px;padding:0;overflow:hidden;font-size:1.15rem">${v?`<img src="${esc(v)}" style="width:100%;height:100%;object-fit:cover">`:esc(ini)}</div><label class="btn-sec btn-sm" style="cursor:pointer">${ic('image',15)} Carregar foto<input type="file" accept="image/*" data-avatar style="display:none"></label><input type="hidden" name="avatar" value="${esc(v)}"><button type="button" class="btn-ghost btn-sm" data-act="av-clear" ${v?'':'style="display:none"'}>Remover</button></div><span class="hint">Imagem quadrada recomendada — fica guardada no perfil do utilizador.</span></div>`; }
  if(f.type==='textarea') return `<div class="${cls}"><label>${esc(f.l)}</label><textarea name="${f.n}">${esc(v)}</textarea>${hint}</div>`;
  const t=f.type||'text';
  if(t==='password') v=''; // nunca pré-preencher palavra-passe
  return `<div class="${cls}"><label>${esc(f.l)}${f.req?' *':''}</label><input type="${t}" name="${f.n}" value="${esc(v)}" ${t==='number'?'step="any"':''} ${t==='password'?'autocomplete="new-password"':''}>${hint}</div>`;
}

let editing=null; // {type, id}
function openModal(type, id=null){
  if(type==='proposta') return openPropModal(id);
  const sc=SCHEMAS[type]; if(!sc) return;
  const isEdit=!!id;
  const item=isEdit?clone(state[sc.store].find(x=>x.id===id)):{};
  editing={type,id,store:sc.store};
  $('#modalTitle').textContent=(isEdit?'Editar ':(sc.fem?'Nova ':'Novo '))+sc.label.toLowerCase();
  $('#modalSub').textContent=isEdit?'A editar registo existente':'A criar novo registo';
  $('#modalForm').innerHTML=`<div class="form-grid">${sc.fields.map(f=>fieldHTML(f,item)).join('')}</div>`;
  $('#modal').classList.remove('wide');
  { const sv=$('[data-act="modal-save"]'); if(sv) sv.textContent='Guardar'; }
  $('#modalDelete').style.display=isEdit?'inline-flex':'none';
  if(type==='utilizador' && isEdit && (item.id==='u1'||item.protegido)) $('#modalDelete').style.display='none';
  $('#modalBack').classList.add('open');
}

function saveModal(){
  if(editing&&editing.type==='__profile') return saveProfile();
  if(editing&&editing.type==='__wizard') return wizardGenerate();
  if(editing&&editing.type==='__send') return doSendEmail(false);
  if(editing&&editing.type==='__auto') return saveAuto();
  if(editing&&editing.type==='__group') return saveGroup();
  if(editing&&editing.type==='proposta') return savePropModal();
  const {type,id,store}=editing; const sc=SCHEMAS[type];
  const fd=new FormData($('#modalForm'));
  const cur=id?state[store].find(x=>x.id===id):null;
  const obj=cur?clone(cur):{id:uid(type.slice(0,3))};
  sc.fields.forEach(f=>{ let v=fd.get(f.n); if(f.type==='number'||f.numeric)v=Number(v||0); obj[f.n]=v; });
  // validação simples
  const miss=sc.fields.filter(f=>f.req&&!String(obj[f.n]||'').trim());
  if(miss.length){ toast('Campos obrigatórios',miss.map(m=>m.l).join(', '),'warn'); return; }
  if(type==='utilizador'){
    const rawPw=String(obj.password||'').trim();
    obj.password = rawPw ? hashPwd(rawPw) : (cur?cur.password:hashPwd('1234'));
    if(state.utilizadores.some(x=>x.id!==obj.id && (x.username||'').toLowerCase()===String(obj.username||'').toLowerCase())){ toast('Nome de utilizador em uso','Escolha outro','warn'); return; }
  }
  if(type==='cliente' && String(obj.nif||'').trim() && !validNIF(obj.nif)){ toast('NIF inválido','O número de contribuinte não passou na validação do dígito de controlo','warn'); return; }
  if(type==='empresa' && String(obj.nipc||'').trim() && !validNIF(obj.nipc)){ toast('NIPC inválido','O número não passou na validação do dígito de controlo','warn'); return; }
  if(sc.code) sc.code(obj);
  if(sc.after) sc.after(obj);
  const i=state[store].findIndex(x=>x.id===obj.id);
  const isNew=i<0;
  if(i>=0) state[store][i]=obj; else state[store].push(obj);
  recalcLoyalty(); save(); closeModal(); render();
  toast(id?'Registo atualizado':'Registo criado', sc.label);

}

const STORE_OF={cliente:'clientes',empresa:'empresas',tarefa:'tarefas',produto:'produtos',familia:'familias',subfamilia:'subfamilias',proposta:'propostas',utilizador:'utilizadores',loyalty:'loyalty',campanha:'campanhas',consentimento:'consentimentos',pedido:'pedidos',ropa:'ropa',violacao:'violacoes',automacao:'automacoes'};
function deleteEntity(type,id){
  const store=STORE_OF[type]; if(!store) return;
  const item=state[store].find(x=>x.id===id);
  if(type==='utilizador' && item && (item.id==='u1'||item.protegido)){ toast('Não permitido','O perfil de administrador/criador não pode ser removido.','warn'); return; }
  const nm=type==='cliente'?clientName(id):(item?.nome||item?.numero||item?.atividade||item?.descricao||'registo');
  if(!confirm(`Eliminar ${type} "${nm}"? Esta ação não pode ser anulada.`)) return;
  state[store]=state[store].filter(x=>x.id!==id);
  if(type==='cliente'){ // limpar dependências
    state.propostas=state.propostas.filter(p=>p.clienteId!==id);
    state.consentimentos=state.consentimentos.filter(c=>c.clienteId!==id);
    state.pedidos=state.pedidos.filter(p=>p.clienteId!==id);
  }
  recalcLoyalty(); save(); closeDrawer(); render(); toast('Eliminado',nm);
}

function printRGPDReport(){
  const s=state.settings;
  const rg=rangeOf('rg'); const act=!!(rg.from||rg.to);
  const fcons=act?state.consentimentos.filter(c=>inDateRange(c.data,rg.from,rg.to)):state.consentimentos;
  const fped=act?state.pedidos.filter(p=>inDateRange(p.data,rg.from,rg.to)):state.pedidos;
  const fviol=act?state.violacoes.filter(v=>inDateRange(v.data,rg.from,rg.to)):state.violacoes;
  const ativos=fcons.filter(c=>c.estado==='Ativo');
  const retirados=fcons.filter(c=>c.estado==='Retirado');

function tryLoadBase(){
  if(baseTried) return; baseTried=true;

  const url=turmaBaseURL();
  fetch(url,{cache:'no-store'}).then(r=>{ if(!r.ok) throw 0; return r.json(); })

    .catch(()=>{});
}

  const url=turmaBaseURL();

    .then(d=>{ if(d&&Array.isArray(d.clientes)){ if(!confirm('Recarregar a base online? Substitui os dados atuais NESTE navegador.')) return; localStorage.setItem(STORE_KEY,JSON.stringify(d)); load(); save(); render(); toast('Base recarregada','Dados online aplicados'); } else toast('Base inválida','O ficheiro não tem o formato esperado','warn'); })

      let badge='';

      if(it.id==='alertas'){ const al=computeAlerts().length; if(al) badge=`<span class="badge" style="background:var(--warn);color:#fff">${al}</span>`; }

function currentView(){ return (location.hash||'#dashboard').slice(1).split('?')[0]||'dashboard'; }
function computeAlerts(){
  const a=[]; const t=todayISO();
  state.propostas.filter(p=>p.validade&&!['Ganha','Perdida'].includes(p.estado)&&daysBetween(t,p.validade)>=0&&daysBetween(t,p.validade)<=15).forEach(p=>a.push({i:'doc',c:'amber',t:`Proposta ${p.numero} a expirar`,s:`Validade ${dPT(p.validade)} · ${clientName(p.clienteId)}`,k:'prop',id:p.id}));
  state.pedidos.filter(p=>p.estado!=='Concluído'&&daysBetween(t,p.prazo)<0).forEach(p=>a.push({i:'shield',c:'red',t:'Pedido RGPD fora de prazo',s:`${p.tipo} · ${clientName(p.clienteId)} · prazo ${dPT(p.prazo)}`,k:'rgpd'}));
  state.pedidos.filter(p=>p.estado!=='Concluído'&&daysBetween(t,p.prazo)>=0&&daysBetween(t,p.prazo)<=7).forEach(p=>a.push({i:'shield',c:'amber',t:'Pedido RGPD a vencer',s:`${p.tipo} · ${clientName(p.clienteId)} · prazo ${dPT(p.prazo)}`,k:'rgpd'}));
  const venc=(state.agendamentos||[]).filter(x=>x.dataAgendada<=t).length; if(venc) a.push({i:'bell',c:'blue',t:`${venc} email(s) agendado(s) vencido(s)`,s:'Abrir Comunicação → Agendados',k:'agend'});
  (state.tarefas||[]).filter(x=>x.estado!=='Concluída'&&x.data<t).forEach(x=>a.push({i:'calendar',c:'amber',t:'Tarefa em atraso',s:`${x.titulo} · ${dPT(x.data)}`,k:'tarefa'}));
  (state.tarefas||[]).filter(x=>x.estado!=='Concluída'&&x.data===t).forEach(x=>a.push({i:'calendar',c:'blue',t:'Tarefa para hoje',s:x.titulo,k:'tarefa'}));
  return a;
}
