function _hexRgb(h){ h=(h||'').replace('#',''); if(h.length===3) h=h.split('').map(c=>c+c).join(''); return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)]; }
function _rgbHex(r){ return '#'+r.map(v=>Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,'0')).join(''); }
function _mix(hex,target,t){ const a=_hexRgb(hex),b=_hexRgb(target); return _rgbHex(a.map((v,i)=>v+(b[i]-v)*t)); }

/* ---------- Importação de clientes via CSV ---------- */
function parseCSV(text){
  text=text.replace(/^﻿/,'');
  const nl=text.indexOf('\n'); const head=nl>=0?text.slice(0,nl):text;
  const delim=(head.split(';').length>head.split(',').length)?';':',';
  const rows=[]; let i=0,field='',row=[],q=false;
  const pf=()=>{row.push(field);field='';}; const pr=()=>{rows.push(row);row=[];};
  while(i<text.length){ const ch=text[i];
    if(q){ if(ch==='"'){ if(text[i+1]==='"'){field+='"';i+=2;continue;} q=false;i++;continue; } field+=ch;i++;continue; }
    if(ch==='"'){q=true;i++;continue;}
    if(ch===delim){pf();i++;continue;}
    if(ch==='\r'){i++;continue;}
    if(ch==='\n'){pf();pr();i++;continue;}
    field+=ch;i++;
  }
  if(field.length||row.length){pf();pr();}
  return rows.filter(r=>r.some(c=>String(c).trim()!==''));
}
function importClientsCSV(file){
  const r=new FileReader();

    try{
      const rows=parseCSV(e.target.result); if(rows.length<2) throw 0;

      const cols={nome:idx('nome'),apelido:idx('apelido'),empresa:idx('empresa'),email:idx('email'),telefone:idx('telefone'),nif:idx('nif'),cidade:idx('cidade'),segmento:idx('segmento'),origem:idx('origem')};
      if(cols.nome<0){ toast('CSV inválido','Falta a coluna "nome"','err'); return; }
      let added=0, skipped=0;
      rows.slice(1).forEach(c=>{
        const g=k=>cols[k]>=0?(c[cols[k]]||'').trim():'';
        const nome=g('nome'); if(!nome){skipped++;return;}
        const email=g('email');
        if(email && state.clientes.some(x=>(x.email||'').toLowerCase()===email.toLowerCase())){skipped++;return;}
        state.clientes.push({id:uid('cli'),numero:pad(++state.settings.numeroSeq,4),nome,apelido:g('apelido'),empresa:g('empresa'),email,telefone:g('telefone'),nif:g('nif'),cidade:g('cidade'),segmento:g('segmento')||'PME',origem:g('origem')||'Importação CSV',loyalty:'Bronze',criado:todayISO(),notas:''});
        added++;
      });
      recalcLoyalty(); save(); render();
      toast('Importação concluída',`${added} adicionado(s)${skipped?` · ${skipped} ignorado(s)`:''}`);
    }catch(err){ toast('Erro no CSV','Verifique o formato e os cabeçalhos','err'); }
  };
  r.readAsText(file);
}

function portalDsarForm(){

      <div class="field full"><label>Mensagem (opcional)</label><textarea name="pmsg" placeholder="Descreva o seu pedido…"></textarea></div>
    </div>

function submitPortalConsent(){
  const f=$('#portal');
  const nome=f.querySelector('[name="pnome"]').value.trim();
  const email=f.querySelector('[name="pemail"]').value.trim();
  if(!nome||!email){ toast('Dados em falta','Indique nome e email','warn'); return; }
  const fins=Array.from(f.querySelectorAll('[name="pfin"]:checked')).map(x=>x.value);
  if(!fins.length){ toast('Selecione uma finalidade','','warn'); return; }
  const c=findOrCreateTitular(nome,email);
  fins.forEach(fin=>{
    const ex=state.consentimentos.find(x=>x.clienteId===c.id&&x.finalidade===fin);
    if(ex){ ex.estado='Ativo'; ex.data=todayISO(); ex.canal='Portal do Titular'; }
    else state.consentimentos.push({id:uid('c'),clienteId:c.id,finalidade:fin,base:'Consentimento',canal:'Portal do Titular',data:todayISO(),estado:'Ativo'});
  });
  save(); state._portalMsg=`Obrigado, ${nome}. Os seus consentimentos (${fins.length}) foram registados.`; state._portalTab='consent'; renderPortal();
}
function submitPortalDsar(){
  const f=$('#portal');
  const nome=f.querySelector('[name="pnome"]').value.trim();
  const email=f.querySelector('[name="pemail"]').value.trim();
  const tipo=f.querySelector('[name="ptipo"]').value;
  const notas=f.querySelector('[name="pmsg"]').value.trim();
  if(!nome||!email){ toast('Dados em falta','Indique nome e email','warn'); return; }
  const c=findOrCreateTitular(nome,email);
  const prazo=addDays(todayISO(),30);
  state.pedidos.push({id:uid('d'),clienteId:c.id,tipo,data:todayISO(),prazo,estado:'Recebido',notas:notas||'(via Portal do Titular)'});
  save(); state._portalMsg=`Pedido de "${tipo}" submetido. Resposta até ${dPT(prazo)}.`; state._portalTab='dsar'; renderPortal();
}

// Popula o dropdown de utilizadores da turma (roster público do Supabase)
function loadTurmaRoster(){
  const sel=$('#loginUserSel'); if(!sel) return;
  supaRpc('listar_utilizadores_publico',{p_codigo:TURMA}).then(list=>{
    const s=$('#loginUserSel'); if(!s) return;
    if(!list||!list.length){ s.innerHTML='<option value="">— sem utilizadores —</option>'; const err=$('#loginErr'); if(err) err.textContent='Turma não encontrada ou ainda sem utilizadores. Confirme o link com o formador.'; return; }
    s.innerHTML=list.map(u=>`<option value="${esc(u.username)}">${esc(((u.nome||'')+' '+(u.apelido||'')).trim()||u.username)} — ${esc(u.papel)}</option>`).join('');
  }).catch(e=>{ const s=$('#loginUserSel'); if(s) s.innerHTML='<option value="">(erro)</option>'; const err=$('#loginErr'); if(err) err.textContent=supaMsg(e); });
}
// Criar turma (Principal): valida e redireciona para ?t=<codigo>
function submitCriarTurma(){
  const f=$('#loginForm'); if(!f) return; const err=$('#loginErr'); if(err) err.textContent='';
  const g=n=>(f.querySelector('[name="'+n+'"]')||{}).value||'';
  const p={codigo:g('codigo').replace(/\D/g,''),email:g('email').trim(),nome:g('nome').trim(),apelido:g('apelido').trim(),username:g('username').trim(),password:g('password'),nomeTurma:g('nometurma').trim()};
  if(!p.email||!p.nome||!p.username||!p.password){ if(err) err.textContent='Preencha email, nome, utilizador e palavra-passe.'; return; }
  if(p.codigo.length!==8){ if(err) err.textContent='O número da turma tem de ter exatamente 8 dígitos.'; return; }
  const btn=f.querySelector('[data-act="criarturma"]'); if(btn){ btn.disabled=true; btn.textContent='A criar…'; }
  supaCriarTurma(p).then(data=>{
    try{ localStorage.setItem('iefp-supa::'+p.codigo, JSON.stringify({token:data.token,user:data.user})); }catch(e){}
    location.href=location.pathname+'?t='+p.codigo;
  }).catch(e=>{ if(err) err.textContent=supaMsg(e); const b=$('#loginForm [data-act="criarturma"]'); if(b){ b.disabled=false; b.textContent='Criar turma e entrar'; } });
}
function switchTurma(){
  const t=prompt('Número da turma (8 dígitos).\nDeixe vazio para o ambiente principal:', TURMA);
  if(t===null) return;
  const d=(t||'').replace(/\D/g,'');
  if(t.trim()!=='' && d.length!==8){ alert('⚠️ O número da turma deve ter exatamente 8 dígitos.\n\nUse o número oficial da turma (ex.: 12345678).'); return; }
  location.href=location.pathname+(d.length===8?('?t='+d):'');
}
function submitLogin(){
  const f=$('#loginForm'); if(!f) return; const e=$('#loginErr'); if(e) e.textContent='';
  const username=(f.querySelector('[name="username"]')||{}).value||'';
  const password=(f.querySelector('[name="password"]')||{}).value||'';
  if(TURMA){
    const btn=f.querySelector('[data-act="login"]'); if(btn){ btn.disabled=true; btn.textContent='A entrar…'; }
    supaLogin(username,password).then(u=>{
      location.hash='#'+firstAllowedView(); render(); toast('Sessão iniciada',`Bem-vindo, ${u.nome}`);
    }).catch(err=>{ if(e) e.textContent=supaMsg(err); const b=$('#loginForm [data-act="login"]'); if(b){ b.disabled=false; b.textContent='Entrar'; } });
    return;
  }
  const r=doLogin(username,password);
  if(r.ok){ location.hash='#'+firstAllowedView(); render(); toast('Sessão iniciada',`Bem-vindo, ${r.user.nome}`); }
  else if(e) e.textContent=r.msg;
}

function logoSrc(){ return document.querySelector('.brand-logo img')?.src||'IEFPnormal.png'; }
function blockHTML(b,p,cor){
  const nl=x=>esc(mergeTags(x,p)).replace(/\n/g,'<br>');
  switch(b.type){
    case 'header':{ const logo=b.logo!==false?`<img src="${logoSrc()}" style="height:42px;margin-bottom:6px" onerror="this.style.display='none'">`:'';
      return `<div style="display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3px solid ${cor};padding-bottom:14px;margin-bottom:16px;gap:16px"><div>${logo}<div style="font-weight:800;font-size:1.2rem;color:${cor}">${esc(mergeTags('{{entidade.nome}}',p))}</div>${b.contactos!==false?`<div style="color:#5f746b;font-size:.82rem">NIF ${esc(mergeTags('{{entidade.nif}}',p))} · ${esc(mergeTags('{{entidade.email}}',p))} · ${esc(mergeTags('{{entidade.telefone}}',p))}</div>`:''}</div><div style="text-align:right"><span style="background:${cor};color:#fff;padding:4px 12px;border-radius:6px;font-weight:800;font-size:.78rem">${esc(b.badge||'PROPOSTA')}</span><div style="color:#5f746b;font-size:.82rem;margin-top:6px">${esc(mergeTags('{{proposta.numero}}',p))}<br>${esc(mergeTags('{{data}}',p))}</div></div></div>`; }
    case 'texto': return `<div style="margin:8px 0;font-size:${b.tamanho||'.92rem'};text-align:${b.alinhamento||'left'};line-height:1.6">${nl(b.conteudo||'')}</div>`;
    case 'imagem': return b.src?`<div style="text-align:${b.alinhamento||'center'};margin:12px 0"><img src="${b.src}" style="max-width:${+b.largura||60}%;border-radius:8px">${b.legenda?`<div style="color:#5f746b;font-size:.78rem;margin-top:4px">${esc(b.legenda)}</div>`:''}</div>`:'';
    case 'cliente': return `<div style="background:#f3faf6;border:1px solid #e2eae5;border-radius:10px;padding:13px 16px;margin:12px 0"><strong style="color:${cor}">${esc(b.titulo||'Cliente')}</strong><div style="margin-top:3px">${esc(mergeTags('{{cliente.nome}}',p))} · ${esc(mergeTags('{{cliente.empresa}}',p))}</div><div style="color:#5f746b;font-size:.84rem">${esc(mergeTags('{{cliente.email}}',p))} · NIF ${esc(mergeTags('{{cliente.nif}}',p))} · ${esc(mergeTags('{{cliente.telefone}}',p))}</div></div>`;
    case 'cotacao':{ const cols=['Descrição','Qtd','Preço']; if(b.mostrarIVA!==false)cols.push('IVA'); cols.push('Total');
      const head=cols.map((h,i)=>`<th style="background:${cor};color:#fff;padding:9px;text-align:${i===0?'left':'right'};font-size:.74rem;text-transform:uppercase">${h}</th>`).join('');
      const rows=(p.linhas||[]).map(l=>{const cells=[esc(l.descricao),esc(l.qtd),fmt(l.preco)];if(b.mostrarIVA!==false)cells.push(esc(l.iva)+'%');cells.push(fmt((+l.qtd||0)*(+l.preco||0)*(1+(+l.iva||0)/100)));return `<tr>${cells.map((c,i)=>`<td style="padding:9px;border-bottom:1px solid #e2eae5;text-align:${i===0?'left':'right'}">${c}</td>`).join('')}</tr>`;}).join('');
      return `${b.titulo?`<h3 style="color:${cor};margin:16px 0 4px;font-size:1.02rem">${nl(b.titulo)}</h3>`:''}<table style="width:100%;border-collapse:collapse;margin:8px 0"><thead><tr>${head}</tr></thead><tbody>${rows}</tbody></table>`; }
    case 'totais':{ const t=proposalTotals(p); return `<div style="display:flex;justify-content:flex-end;margin:8px 0"><div style="min-width:250px">${b.mostrarSubtotal!==false?`<div style="display:flex;justify-content:space-between;padding:3px 0"><span style="color:#5f746b">Subtotal</span><span>${fmt(t.sub)}</span></div>`:''}${t.desconto>0?`<div style="display:flex;justify-content:space-between;padding:3px 0;color:${cor}"><span>Desconto loyalty (${t.descontoPct}%)</span><span>− ${fmt(t.desconto)}</span></div>`:''}${b.mostrarIVA!==false?`<div style="display:flex;justify-content:space-between;padding:3px 0"><span style="color:#5f746b">IVA</span><span>${fmt(t.iva)}</span></div>`:''}<div style="display:flex;justify-content:space-between;padding:8px 0 0;margin-top:4px;border-top:2px solid ${cor};font-weight:800;font-size:1.1rem;color:${cor}"><span>Total</span><span>${fmt(t.total)}</span></div></div></div>`; }
    case 'condicoes': return `<div style="background:#f7faf8;border-left:3px solid ${cor};padding:11px 16px;border-radius:0 8px 8px 0;margin:14px 0;font-size:.85rem;color:#3a4d44;line-height:1.6">${nl(b.conteudo||'')}</div>`;
    case 'assinatura': return `<div style="margin:28px 0 8px;display:flex;justify-content:${b.alinhamento||'flex-start'}"><div style="border-top:1px solid #15302a;min-width:200px;padding-top:6px;text-align:center;font-size:.86rem">${nl(b.texto||'Assinatura')}</div></div>`;
    case 'divisor': return `<hr style="border:0;border-top:1px solid #e2eae5;margin:14px 0">`;
    case 'espaco': return `<div style="height:${+b.altura||24}px"></div>`;
    default: return '';
  }
}
function blocksHTML(tpl,p){ const cor=tpl.cor||'#006B3C'; return (tpl.blocks||[]).map(b=>blockHTML(b,p,cor)).join(''); }
function proposalDocHTML(tpl,p){
  return `<!doctype html><html lang="pt-PT"><head><meta charset="UTF-8"><title>${esc(p.numero||'Proposta')} — ${esc(p.titulo||'')}</title>
  <style>
    @page{size:A4;margin:15mm 14mm 17mm}
    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{font-family:Inter,system-ui,sans-serif;color:#15302a;font-size:13px;line-height:1.5;background:#eef2f0}
    .doc{background:#fff;width:794px;min-height:1123px;max-width:100%;margin:24px auto;padding:44px 46px 70px;display:flex;flex-direction:column;box-shadow:0 10px 40px rgba(0,0,0,.13);border-radius:4px}
    .doc>*:last-child{margin-top:auto;padding-top:22px}
    table{width:100%;border-collapse:collapse}
    tr,img,table{page-break-inside:avoid}
    h3{margin:0}
    @media print{
      html,body{background:#fff}
      body{font-size:11pt}
      .doc{display:block;width:auto;min-height:0;max-width:none;margin:0;padding:0;box-shadow:none;border-radius:0}
      .doc>*:last-child{position:fixed;bottom:0;left:0;right:0;margin:0;padding:4mm 14mm 0;border-top:1px solid #e2eae5;background:#fff}
    }
  </style></head><body><div class="doc">${blocksHTML(tpl,p)}</div></body></html>`;
}
function openPrint(html){ const w=window.open('','_blank'); if(!w){ toast('Pop-up bloqueado','Permita pop-ups para exportar','warn'); return; } w.document.write(html); w.document.close(); setTimeout(()=>{try{w.print();}catch(e){}},350); }
function exemploProp(){ return state.propostas[0]||{numero:'PROP-0000',titulo:'Proposta de exemplo',clienteId:state.clientes[0]?.id,validade:todayISO(),criada:todayISO(),linhas:[{descricao:'Artigo de exemplo',qtd:1,preco:100,iva:23}]}; }

/* ---- editor por blocos ---- */
let tplDraft=null, tplSel=null, lastTagEl=null, tplDragFrom=null;
function newTemplate(){ return {id:uid('pt'),nome:'',cor:'#006B3C',criadoPor:(currentUser()?currentUser().id:null),criadoEm:todayISO(),blocks:[defaultBlock('header'),defaultBlock('texto'),defaultBlock('cliente'),defaultBlock('cotacao'),defaultBlock('totais'),defaultBlock('condicoes')]}; }
function openTplEditor(id){ tplDraft = id ? clone(state.propostaTemplates.find(x=>x.id===id)) : newTemplate(); tplSel = tplDraft.blocks.length?0:null; if(currentView()!=='modelos'){ location.hash='#modelos'; setTimeout(render,0); } else render(); }
function updatePaper(){ const el=$('#tplPaper'); if(el&&tplDraft) el.innerHTML=blocksHTML(tplDraft,exemploProp()); }
function applyBlockField(el){ if(!tplDraft) return; const i=+el.dataset.bi, f=el.dataset.bf; const b=tplDraft.blocks[i]; if(!b) return; b[f]= el.type==='checkbox'?el.checked : (el.type==='number'?Number(el.value): el.value); updatePaper(); }
function addBlock(t){ if(!tplDraft) return; const at=(tplSel==null?tplDraft.blocks.length:tplSel+1); tplDraft.blocks.splice(at,0,defaultBlock(t)); tplSel=at; render(); }
function delBlock(i){ if(!tplDraft) return; tplDraft.blocks.splice(i,1); tplSel= tplDraft.blocks.length?Math.min(i,tplDraft.blocks.length-1):null; render(); }
function moveBlock(i,d){ if(!tplDraft) return; const j=i+d; if(j<0||j>=tplDraft.blocks.length) return; const a=tplDraft.blocks; const tmp=a[i];a[i]=a[j];a[j]=tmp; tplSel=j; render(); }
function reorderBlock(from,to){ if(!tplDraft||from===to||from==null||to==null) return; const a=tplDraft.blocks; const m=a.splice(from,1)[0]; a.splice(to,0,m); tplSel=to; render(); }
function selectBlock(i){ tplSel=i; render(); }
function syncTplMeta(){ const n=$('#tplName'), c=$('#tplCor'); if(n)tplDraft.nome=n.value; if(c)tplDraft.cor=c.value; }
function saveTpl(){ syncTplMeta(); if(!String(tplDraft.nome||'').trim()){ toast('Falta o nome','Dê um nome ao modelo','warn'); return; } const i=state.propostaTemplates.findIndex(x=>x.id===tplDraft.id); if(i>=0) state.propostaTemplates[i]=tplDraft; else { tplDraft.criadoPor=currentUser()?currentUser().id:tplDraft.criadoPor; tplDraft.criadoEm=todayISO(); state.propostaTemplates.push(tplDraft); } const nm=tplDraft.nome; save(); tplDraft=null; tplSel=null; render(); toast(i>=0?'Modelo atualizado':'Modelo criado', nm); }
function cancelTpl(){ tplDraft=null; tplSel=null; render(); }
function onBlockImage(input){ const f=input.files&&input.files[0]; const i=+input.dataset.bimg; if(!f||!tplDraft||!tplDraft.blocks[i]) return; const r=new FileReader(); r.onload=ev=>{ const img=new Image(); img.onload=()=>{ const max=1000; let w=img.width,h=img.height; if(w>max){h=Math.round(h*max/w);w=max;} const cv=document.createElement('canvas'); cv.width=w;cv.height=h; cv.getContext('2d').drawImage(img,0,0,w,h); let url; try{url=cv.toDataURL('image/jpeg',0.82);}catch(e){url=ev.target.result;} tplDraft.blocks[i].src=url; render(); toast('Imagem adicionada'); }; img.src=ev.target.result; }; r.readAsDataURL(f); }
function onAvatarFile(input){ const f=input.files&&input.files[0]; if(!f) return; const r=new FileReader(); r.onload=ev=>{ const img=new Image(); img.onload=()=>{ const S=220, cv=document.createElement('canvas'); cv.width=S; cv.height=S; const ctx=cv.getContext('2d'); const min=Math.min(img.width,img.height), sx=(img.width-min)/2, sy=(img.height-min)/2; ctx.drawImage(img,sx,sy,min,min,0,0,S,S); let url; try{ url=cv.toDataURL('image/jpeg',0.85); }catch(e){ url=ev.target.result; } const hid=$('#modalForm [name="avatar"]'); if(hid) hid.value=url; const prev=$('#avPreview'); if(prev) prev.innerHTML='<img src="'+url+'" style="width:100%;height:100%;object-fit:cover">'; const clr=$('#modalForm [data-act="av-clear"]'); if(clr) clr.style.display=''; }; img.src=ev.target.result; }; r.readAsDataURL(f); }
function insertTag(tag){ const ta=(lastTagEl&&lastTagEl.isConnected)?lastTagEl:document.querySelector('#content [data-tagtarget]'); if(!ta) return; const s=ta.selectionStart??ta.value.length, e=ta.selectionEnd??ta.value.length; const ins='{{'+tag+'}}'; ta.value=ta.value.slice(0,s)+ins+ta.value.slice(e); ta.focus(); const np=s+ins.length; ta.setSelectionRange(np,np); if(ta.dataset.bf!=null) applyBlockField(ta); }

/* ---- vistas do módulo Modelos ---- */
views.modelos = () => tplDraft ? tplEditorHTML() : tplListHTML();
function tplListHTML(){
  return `
  <div class="card card-pad">
    <div class="section-head"><div><h3>Modelos de Proposta</h3><div class="sub">Construa documentos profissionais por blocos (arraste para reordenar). Usados ao exportar propostas em PDF.</div></div><button class="btn" data-act="tpl-new">${ic('layout',16)} Novo modelo</button></div>
  </div>
  <div class="grid cols-3">
    ${state.propostaTemplates.map(t=>{const autor=state.utilizadores.find(u=>u.id===t.criadoPor);return `<div class="card card-pad tpl-card" data-act="tpl-edit" data-id="${t.id}" style="cursor:pointer">
      <div class="tpl-thumb"><div class="tpl-thumb-inner">${blocksHTML(t,exemploProp())}</div></div>
      <div class="section-head" style="margin-top:12px"><div><strong>${esc(t.nome)}</strong><div class="muted" style="font-size:.78rem">${t.blocks.length} blocos · ${esc(autor?autor.nome:'—')} · ${dPT(t.criadoEm)}</div></div><span style="width:16px;height:16px;border-radius:4px;background:${esc(t.cor)};display:inline-block;flex:0 0 auto"></span></div>
      <div class="toolbar" style="margin-top:10px"><button class="btn-sec btn-sm" data-act="tpl-edit" data-id="${t.id}" data-stop>Editar</button><button class="btn-danger btn-sm" data-act="del-proptpl" data-id="${t.id}" data-stop>${ic('trash',14)}</button></div>
    </div>`;}).join('')||empty('Sem modelos','Crie o primeiro modelo de proposta.')}
  </div>`;
}
function tplEditorHTML(){
  const d=tplDraft;
  return `
  <div class="card card-pad">
    <div class="section-head" style="align-items:center">
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
        <button class="btn-ghost" data-act="tpl-cancel">← Voltar</button>
        <input id="tplName" value="${esc(d.nome)}" placeholder="Nome do modelo…" style="font-weight:800;font-size:1.05rem;border:1px solid var(--border);border-radius:9px;padding:8px 12px;background:var(--surface2);min-width:200px">
        <label class="chip" style="gap:8px">Cor <input id="tplCor" type="color" value="${esc(d.cor)}" style="width:30px;height:24px;border:0;background:none;padding:0;cursor:pointer"></label>
      </div>
      <div class="toolbar"><button class="btn-sec" data-act="tpl-test">${ic('print',15)} Testar PDF</button><button class="btn" data-act="tpl-save">${ic('check',16)} Guardar modelo</button></div>
    </div>
  </div>
  <div class="tpl-editor">
    <div class="tpl-side">
      <div class="card card-pad">
        <h4 style="font-weight:800;font-size:.9rem;margin-bottom:10px">Estrutura <span class="muted" style="font-weight:500;font-size:.78rem">— arraste para reordenar</span></h4>
        <div class="block-list" id="blockList">${d.blocks.map((b,i)=>blockRowHTML(b,i)).join('')||'<div class="empty" style="padding:16px">Sem blocos</div>'}</div>
      </div>
      <div class="card card-pad">
        <h4 style="font-weight:800;font-size:.9rem;margin-bottom:10px">Adicionar bloco</h4>
        <div class="palette">${BLOCK_TYPES.map(bt=>`<button class="btn-sec btn-sm" data-act="tpl-add" data-bt="${bt.t}">${ic(bt.icon,14)} ${bt.l}</button>`).join('')}</div>
      </div>
      ${tplSel!=null&&d.blocks[tplSel]?`<div class="card card-pad" id="inspector">${inspectorHTML(d.blocks[tplSel],tplSel)}</div>`:''}
    </div>
    <div class="tpl-preview-wrap"><div class="paper" id="tplPaper">${blocksHTML(d,exemploProp())}</div></div>
  </div>`;
}
function blockRowHTML(b,i){
  return `<div class="block-row ${i===tplSel?'sel':''}" draggable="true" data-blockrow="${i}" data-act="tpl-select" data-i="${i}">
    <span class="bhandle">${ic('grip',16)}</span>
    <span class="blabel">${esc(BLOCK_LABEL[b.type]||b.type)}</span>
    <span class="bact">
      <button data-act="tpl-up" data-i="${i}" data-stop title="Subir">▲</button>
      <button data-act="tpl-down" data-i="${i}" data-stop title="Descer">▼</button>
      <button data-act="tpl-delblock" data-i="${i}" data-stop title="Remover">${ic('trash',13)}</button>
    </span>
  </div>`;
}
function selAlign(i,v,opts){ opts=opts||[['left','Esquerda'],['center','Centro'],['right','Direita']]; return `<select data-bi="${i}" data-bf="alinhamento">${opts.map(o=>`<option value="${o[0]}" ${v===o[0]?'selected':''}>${o[1]}</option>`).join('')}</select>`; }
function inspectorHTML(b,i){
  const head=`<h4 style="font-weight:800;font-size:.9rem;margin-bottom:12px;color:var(--g700)">${ic('cog',15)} ${esc(BLOCK_LABEL[b.type]||b.type)}</h4>`;
  const F=(l,inner)=>`<div class="field" style="margin-bottom:10px"><label>${l}</label>${inner}</div>`;
  const chk=(f,l)=>`<label style="display:block;margin-bottom:8px;font-size:.85rem;cursor:pointer"><input type="checkbox" data-bi="${i}" data-bf="${f}" ${b[f]?'checked':''} style="vertical-align:-2px;margin-right:8px;width:15px;height:15px;accent-color:var(--g600)">${l}</label>`;
  const tagbar=`<div class="muted" style="font-size:.72rem;margin:6px 0 4px">Inserir tag no campo:</div><div style="display:flex;flex-wrap:wrap;gap:4px">${TAGS.map(t=>`<button class="tag" data-act="tag-insert" data-tag="${t}" style="cursor:pointer;border:0;font-size:.67rem">${t}</button>`).join('')}</div>`;
  let body='';
  if(b.type==='header') body=F('Etiqueta',`<input data-bi="${i}" data-bf="badge" value="${esc(b.badge||'')}">`)+chk('logo','Mostrar logótipo')+chk('contactos','Mostrar contactos da entidade');
  else if(b.type==='texto') body=F('Conteúdo',`<textarea data-bi="${i}" data-bf="conteudo" data-tagtarget rows="5">${esc(b.conteudo||'')}</textarea>`)+F('Alinhamento',selAlign(i,b.alinhamento))+tagbar;
  else if(b.type==='condicoes') body=F('Conteúdo',`<textarea data-bi="${i}" data-bf="conteudo" data-tagtarget rows="4">${esc(b.conteudo||'')}</textarea>`)+tagbar;
  else if(b.type==='imagem') body=(b.src?`<img src="${b.src}" style="max-width:100%;border-radius:8px;margin-bottom:8px;border:1px solid var(--border)">`:`<div class="empty" style="padding:16px;margin-bottom:8px">Sem imagem</div>`)+F('Carregar imagem',`<input type="file" accept="image/*" data-bimg="${i}">`)+F('Largura (%)',`<input type="number" data-bi="${i}" data-bf="largura" value="${esc(b.largura||60)}">`)+F('Alinhamento',selAlign(i,b.alinhamento))+F('Legenda',`<input data-bi="${i}" data-bf="legenda" value="${esc(b.legenda||'')}">`);
  else if(b.type==='cliente') body=F('Título da caixa',`<input data-bi="${i}" data-bf="titulo" value="${esc(b.titulo||'')}">`);
  else if(b.type==='cotacao') body=F('Título',`<input data-bi="${i}" data-bf="titulo" data-tagtarget value="${esc(b.titulo||'')}">`)+chk('mostrarIVA','Mostrar coluna IVA')+tagbar;
  else if(b.type==='totais') body=chk('mostrarSubtotal','Mostrar subtotal')+chk('mostrarIVA','Mostrar IVA');
  else if(b.type==='assinatura') body=F('Texto',`<input data-bi="${i}" data-bf="texto" value="${esc(b.texto||'')}">`)+F('Alinhamento',selAlign(i,b.alinhamento,[['flex-start','Esquerda'],['center','Centro'],['flex-end','Direita']]));
  else if(b.type==='espaco') body=F('Altura (px)',`<input type="number" data-bi="${i}" data-bf="altura" value="${esc(b.altura||24)}">`);
  else if(b.type==='divisor') body='<p class="muted" style="font-size:.82rem">Linha divisória — sem opções.</p>';
  return head+body;
}
function delPropTpl(id){ if(!id) return; if(!confirm('Eliminar este modelo de proposta?')) return; state.propostaTemplates=state.propostaTemplates.filter(x=>x.id!==id); save(); render(); toast('Modelo eliminado'); }

/* ---------- arranque ---------- */
load();
applyTheme(localStorage.getItem('iefp-theme')||'light');
applyBrand();
if(localStorage.getItem('iefp-nav')==='1') $('#app').classList.add('nav-collapsed');
restoreSupaSession();
render();
tryLoadBase();

// Kanban drag & drop (delegado, re-liga após cada render via listeners no documento)
let dragId=null;
document.addEventListener('dragstart',e=>{
  const c=e.target.closest('.kcard'); if(c){ dragId=c.dataset.id; c.classList.add('dragging'); return; }
  const br=e.target.closest('.block-row'); if(br){ tplDragFrom=+br.dataset.blockrow; br.classList.add('dragging'); }
});
document.addEventListener('dragend',e=>{
  const c=e.target.closest('.kcard'); if(c)c.classList.remove('dragging'); $$('.klist').forEach(l=>l.classList.remove('drop'));
  $$('.block-row').forEach(r=>r.classList.remove('dragging','dragover')); tplDragFrom=null;
});
document.addEventListener('dragover',e=>{
  const l=e.target.closest('.klist'); if(l){ e.preventDefault(); $$('.klist').forEach(x=>x.classList.toggle('drop',x===l)); return; }
  const br=e.target.closest('.block-row'); if(br&&tplDragFrom!=null){ e.preventDefault(); $$('.block-row').forEach(r=>r.classList.toggle('dragover',r===br)); }
});
document.addEventListener('drop',e=>{
  const l=e.target.closest('.klist'); if(l&&dragId){ e.preventDefault(); const p=state.propostas.find(x=>x.id===dragId); if(p&&p.estado!==l.dataset.status){ const oldE=p.estado; p.estado=l.dataset.status; p.alteradoPor=currentUser()?currentUser().id:null; p.alteradoEm=todayISO(); recalcLoyalty(); save(); render(); toast('Proposta movida',`${p.numero} → ${l.dataset.status}`); onPropStatusChange(p,oldE,p.estado); } dragId=null; return; }
  const br=e.target.closest('.block-row'); if(br&&tplDragFrom!=null){ e.preventDefault(); reorderBlock(tplDragFrom, +br.dataset.blockrow); tplDragFrom=null; }
});

})();
</script>
</body>
</html>
