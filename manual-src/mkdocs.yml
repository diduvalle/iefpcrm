site_name: IEFP CRM — Manual
site_url: https://iefpcrm.cr0x.org/manual/
site_description: Manual da plataforma IEFP CRM — guia para formadores e formandos das UFCD 10868 e 10870.
site_author: Diogo du Valle
copyright: IEFP CRM · Plataforma de Formação

docs_dir: docs
site_dir: ../manual

theme:
  name: material
  custom_dir: overrides
  language: pt-BR
  logo: assets/logo.png
  favicon: assets/favicon.png
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tooltips
    - toc.follow
  palette:
    # Modo claro POR DEFEITO (independente do sistema)
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: iefp/moon
        name: Mudar para modo escuro
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: iefp/sun
        name: Mudar para modo claro

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true
      title: Nesta página

extra:
  social:
    - icon: octicons/globe-16
      link: https://iefpcrm.cr0x.org
      name: Abrir a plataforma

nav:
  - Início: index.md
  - 1. Primeiros passos:
      - 1.1 Sou Formador: primeiros-passos/formador.md
      - 1.2 Sou Formando: primeiros-passos/formando.md
  - 2. Tutoriais guiados:
      - 2.1 Do zero à 1.ª proposta: tutoriais/primeira-proposta.md
      - 2.2 Montar a turma (10 min): tutoriais/montar-turma.md
  - 3. Para o Formador:
      - 3.1 Gerir a turma: formador/gerir-turma.md
      - 3.2 Entrega & validação: formador/entregas.md
      - 3.3 Email & Marca: formador/email-marca.md
  - 4. Para o Formando:
      - 4.1 Trabalhar no CRM: formando/trabalhar.md
      - 4.2 Submeter o trabalho: formando/submeter.md
      - 4.3 Recuperar a password: formando/recuperar.md
  - 5. Funcionalidades:
      - 5.0 Visão geral: modulos/index.md
      - 5.1 Dashboard & Agenda: modulos/dashboard-agenda.md
      - 5.2 Empresas & Contactos: modulos/empresas-contactos.md
      - 5.3 Produtos: modulos/produtos.md
      - 5.4 Propostas: modulos/propostas.md
      - 5.5 Modelos de Proposta: modulos/modelos.md
      - 5.6 Campanhas & Email: modulos/campanhas-email.md
      - 5.7 Analytics: modulos/analytics.md
      - 5.8 Alertas: modulos/alertas.md
      - 5.9 Definições: modulos/definicoes.md
  - 6. RGPD & Pedagogia: rgpd.md
  - 7. FAQ: faq.md
  - 8. Glossário: glossario.md
